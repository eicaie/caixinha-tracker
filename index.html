<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Caixinha" />
  <title>Caixinha Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    /* ── Paleta azul-escuro financeiro ── */
    :root {
      --bg:        #080E1A;
      --bg2:       #0D1526;
      --bg3:       #111D33;
      --bg4:       #162040;
      --border:    #1E2E4A;
      --border2:   #243555;
      --text:      #E8EEF8;
      --text2:     #8FA3C4;
      --text3:     #4A6080;
      --green:     #1FD99A;
      --red:       #FF5F6D;
      --orange:    #FFB347;
      --purple:    #8B6FFF;
    }

    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; padding-bottom: 56px; }
    h1 { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
    .subtitle { font-size: 11px; color: var(--text3); margin-top: 8px; letter-spacing: 0.08em; }
    .header { padding: 52px 20px 28px; max-width: 680px; margin: 0 auto; display: flex; align-items: flex-start; justify-content: space-between; }
    .header-left h1 span { color: var(--green); }
    .wrap { max-width: 680px; margin: 0 auto; padding: 0 20px; }
    .cards { display: flex; flex-direction: column; gap: 14px; }

    /* Botão olho */
    .eye-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; color: var(--text2); padding: 10px 14px; font-size: 18px; cursor: pointer; line-height: 1; margin-top: 4px; }
    .eye-btn:active { opacity: 0.7; }

    /* Summary */
    .summary-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 20px 18px; margin-bottom: 14px; }
    .summary-title { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 14px; }
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .summary-item { background: var(--bg3); border-radius: 14px; padding: 14px; border: 1px solid var(--border); }
    .summary-item.full { grid-column: 1 / -1; }
    .summary-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .summary-val { font-size: 24px; font-weight: 500; color: var(--green); }
    .summary-val-sm { font-size: 16px; font-weight: 500; }

    /* Card */
    .card { background: var(--bg2); border-radius: 20px; padding: 22px 18px; border: 1px solid var(--border); }
    .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .card-title { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .dot { width: 9px; height: 9px; border-radius: 50%; animation: pulse 2s infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.45} }
    .nome { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; color: var(--text); }
    .tag { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .card-actions { display: flex; gap: 6px; }
    .edit-btn { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; font-family: 'DM Mono', monospace; font-size: 13px; cursor: pointer; }

    /* Metrics */
    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
    .metric { background: var(--bg3); border-radius: 14px; padding: 14px; border: 1px solid var(--border); }
    .metric-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .metric-val { font-size: 18px; font-weight: 500; }
    .metric-total { background: var(--bg3); border-radius: 12px; padding: 11px 14px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); }
    .metric-total-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
    .metric-total-val { font-size: 13px; font-weight: 500; }
    .last-entry { font-size: 11px; color: var(--text3); margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
    .last-entry-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* Tabela */
    .table-wrap { margin-bottom: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .table-head { display: grid; grid-template-columns: 82px 1fr 82px 1fr 28px; gap: 6px; padding: 0 10px 8px; font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; min-width: 340px; }
    .reg-row { display: grid; grid-template-columns: 82px 1fr 82px 1fr 28px; gap: 6px; align-items: center; padding: 11px 10px; background: var(--bg3); border-radius: 10px; margin-bottom: 6px; font-size: 13px; min-width: 340px; border: 1px solid var(--border); }
    .reg-row:last-child { margin-bottom: 0; }
    .reg-date { color: var(--text3); font-size: 12px; }
    .reg-saldo { color: var(--text); }
    .mov-entrada { color: var(--green); font-size: 12px; }
    .mov-saida { color: var(--orange); font-size: 12px; }
    .mov-nenhum { color: var(--text3); font-size: 12px; }
    .rend-pos { color: var(--green); }
    .rend-neg { color: var(--red); }
    .rend-null { color: var(--text3); }
    .del-btn { background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; padding: 0; line-height: 1; width: 28px; text-align: center; transition: color 0.15s; }
    .del-btn:hover { color: var(--red); }
    .empty { text-align: center; color: var(--text3); font-size: 12px; padding: 16px 0 12px; }
    .ver-mais-btn { width: 100%; background: none; border: 1px solid var(--border); border-radius: 10px; padding: 10px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); cursor: pointer; margin: 8px 0; }

    /* Gráfico */
    .chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 22px 18px; margin-bottom: 14px; }
    .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
    .chart-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; color: var(--text); }
    .month-nav { display: flex; align-items: center; gap: 10px; }
    .nav-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); border-radius: 8px; width: 32px; height: 32px; font-size: 18px; cursor: pointer; }
    .month-label { font-size: 12px; color: var(--text2); min-width: 88px; text-align: center; }
    .chart-area { position: relative; height: 160px; }
    .chart-legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 14px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .chart-total { font-size: 12px; color: var(--text3); margin-top: 8px; }
    .chart-total span { color: var(--green); font-weight: 500; }

    /* Botão registrar */
    .reg-btn-wrap { margin-bottom: 14px; }
    .reg-btn-main { width: 100%; background: rgba(31,217,154,0.12); color: var(--green); border: 1px solid rgba(31,217,154,0.3); border-radius: 14px; padding: 16px; font-family: 'DM Mono', monospace; font-size: 14px; letter-spacing: 0.05em; cursor: pointer; font-weight: 500; }

    /* Modal gerenciar */
    .cx-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
    .cx-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--bg3); border-radius: 14px; cursor: pointer; border: 1px solid var(--border2); }
    .cx-item-left { display: flex; align-items: center; gap: 10px; }
    .cx-item-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .cx-actions { display: flex; gap: 6px; }
    .cx-del-btn { background: rgba(255,95,109,0.12); color: var(--red); border: none; border-radius: 8px; padding: 6px 10px; font-size: 11px; cursor: pointer; font-family: 'DM Mono', monospace; }
    .cx-edit-btn { background: var(--bg4); color: var(--text2); border: none; border-radius: 8px; padding: 6px 10px; font-size: 11px; cursor: pointer; font-family: 'DM Mono', monospace; }
    .new-cx-btn { width: 100%; background: none; border: 1px dashed var(--border2); border-radius: 14px; padding: 14px; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text3); cursor: pointer; margin-top: 4px; }
    .modal-back-btn { background: none; border: none; color: var(--text3); font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; margin-bottom: 16px; padding: 0; }

    /* Seletor de cor */
    .color-picker-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 6px; }
    .color-swatch { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.15s, border 0.15s; flex-shrink: 0; }
    .color-swatch.selected { border-color: #fff; transform: scale(1.15); }

    /* Backup + tip */
    .backup-bar { display: flex; gap: 10px; margin-top: 12px; }
    .bkp-btn { flex: 1; border: none; border-radius: 12px; padding: 13px; font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; }
    .bkp-export { background: rgba(31,217,154,0.1); color: var(--green); border: 1px solid rgba(31,217,154,0.25); }
    .bkp-import { background: rgba(139,111,255,0.1); color: var(--purple); border: 1px solid rgba(139,111,255,0.25); }
    .tip { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; font-size: 12px; color: var(--text3); line-height: 1.7; margin-top: 12px; }
    .tip span { color: var(--green); }

    /* Toast */
    .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg3); color: var(--green); border: 1px solid rgba(31,217,154,0.3); border-radius: 30px; padding: 11px 24px; font-size: 13px; opacity: 0; transition: opacity 0.2s, transform 0.2s; z-index: 300; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Modal */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(4,8,18,0.88); z-index: 200; align-items: flex-end; justify-content: center; backdrop-filter: blur(8px); }
    .overlay.open { display: flex; }
    .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 24px 24px 0 0; padding: 28px 22px 48px; width: 100%; max-width: 680px; animation: slideUp 0.22s ease; max-height: 90vh; overflow-y: auto; }
    @media (min-height: 700px) { .overlay { align-items: center; } .modal { border-radius: 24px; max-width: 440px; } }
    @keyframes slideUp { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 20px; margin-bottom: 4px; color: var(--text); }
    .modal-sub { font-size: 11px; color: var(--text3); margin-bottom: 22px; }
    .field { margin-bottom: 16px; }
    .field label { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; display: block; margin-bottom: 8px; text-transform: uppercase; }
    .field input { background: var(--bg3); border: 1px solid var(--border2); border-radius: 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 16px; padding: 14px; width: 100%; outline: none; transition: border 0.2s; }
    .field input:focus { border-color: var(--green); }
    .field-hint { font-size: 10px; color: var(--text3); margin-top: 5px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
    .sec-label { font-size: 11px; color: var(--text3); margin-bottom: 12px; letter-spacing: 0.05em; }
    .modal-btns { display: flex; gap: 10px; margin-top: 22px; }
    .cancel-btn { flex: 1; background: var(--bg3); color: var(--text2); border: 1px solid var(--border); border-radius: 12px; padding: 15px; font-family: 'DM Mono', monospace; font-size: 13px; cursor: pointer; }
    .confirm-btn { flex: 2; border: none; border-radius: 12px; padding: 15px; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; cursor: pointer; }
    .confirm-green { background: var(--green); color: #000; }
    .confirm-purple { background: var(--purple); color: #fff; }

    /* Valor oculto */
    .hidden-val { color: var(--text3); letter-spacing: 0.15em; font-size: 16px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>CAIXINHA<br><span>TRACKER</span></h1>
    <div class="subtitle">REGISTRE O SALDO → VEJA QUANTO RENDEU</div>
  </div>
  <button class="eye-btn" id="eye-btn" onclick="toggleOcultar()" title="Ocultar/mostrar valores">👁</button>
</div>

<div class="wrap">
  <div class="summary-card">
    <div class="summary-title">Resumo geral</div>
    <div class="summary-grid" id="summary-grid"></div>
  </div>

  <div class="chart-card">
    <div class="chart-header">
      <span class="chart-title">Rendimento mensal acumulado</span>
      <div class="month-nav">
        <button class="nav-btn" onclick="mudarMes(-1)">‹</button>
        <span class="month-label" id="month-label"></span>
        <button class="nav-btn" id="nav-next" onclick="mudarMes(1)">›</button>
      </div>
    </div>
    <div class="chart-area"><canvas id="chart"></canvas></div>
    <div class="chart-legend" id="chart-legend"></div>
    <div class="chart-total" id="chart-total"></div>
  </div>

  <div class="reg-btn-wrap">
    <button class="reg-btn-main" onclick="abrirGerenciar()">+ Registrar saldo</button>
  </div>

  <div class="cards" id="cards"></div>

  <div class="backup-bar">
    <button class="bkp-btn bkp-export" onclick="exportarBackup()">⬇ Exportar backup</button>
    <button class="bkp-btn bkp-import" onclick="document.getElementById('import-file').click()">⬆ Importar backup</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importarBackup(event)" />
  </div>
  <div class="tip">
    <span>Como usar:</span> Toque em "+ Registrar saldo" para lançar valores ou gerenciar caixinhas. Use o 👁 para ocultar valores. Personalize a cor de cada caixinha no ✎.
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="overlay" onclick="fecharModal(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <div id="modal-body"></div>
    <div class="modal-btns" id="modal-btns">
      <button class="cancel-btn" onclick="closeModal()">Cancelar</button>
      <button class="confirm-btn confirm-green" id="confirm-btn" onclick="confirmar()">Salvar</button>
    </div>
  </div>
</div>

<script>
var STORAGE_KEY = "caixinha_tracker_v2";
var NOMES_MES = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

// Paleta de cores para seleção
var PALETTE = [
  "#8B5CF6", // Nubank roxo
  "#1FD99A", // verde
  "#3B82F6", // azul
  "#F59E0B", // âmbar
  "#EF4444", // vermelho
  "#EC4899", // rosa
  "#06B6D4", // ciano
  "#F97316", // laranja
  "#10B981", // esmeralda
  "#6366F1", // índigo
  "#84CC16", // lima
  "#14B8A6", // teal
];

var oculto = false;

function getHex(c) {
  return c.cor || PALETTE[c.id % PALETTE.length] || "#1FD99A";
}

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function() { t.classList.remove("show"); }, 2200);
}

function toggleOcultar() {
  oculto = !oculto;
  document.getElementById("eye-btn").textContent = oculto ? "🙈" : "👁";
  render();
}

function mascarar(html) {
  return oculto ? '<span class="hidden-val">••••••</span>' : html;
}

function diasDesdeUltimo(registros) {
  if (!registros || !registros.length) return null;
  var ultimo = registros[registros.length - 1];
  var diff = Math.floor((new Date() - new Date(ultimo.data + "T12:00:00")) / 86400000);
  if (diff === 0) return "hoje";
  if (diff === 1) return "ontem";
  return "há " + diff + " dias";

function carregarDados() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      var dados = JSON.parse(raw);
      if (dados && Array.isArray(dados) && dados.length > 0) return dados;
    }
  } catch(e) {}
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DADOS_BACKUP));
  return JSON.parse(JSON.stringify(DADOS_BACKUP));
}

function salvarDados() { localStorage.setItem(STORAGE_KEY, JSON.stringify(caixinhas)); }

var caixinhas = carregarDados();
var modalState = null;
var mesAtual = new Date(); mesAtual.setDate(1);
var expandido = {};

function fBRL(v) { return Number(v).toLocaleString("pt-BR", {style:"currency", currency:"BRL"}); }
function fData(d) { return new Date(d+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit"}); }
function hoje() { return new Date().toISOString().split("T")[0]; }

function calcRendimentos(registros) {
  return registros.map(function(reg, i) {
    if (i === 0) return Object.assign({}, reg, {rendimento: null});
    var ant = registros[i-1];
    return Object.assign({}, reg, {rendimento: reg.saldo - ant.saldo - (reg.entrada||0) + (reg.saida||0)});
  });
}
function totalRendimento(registros) {
  if (!registros || registros.length < 2) return null;
  return calcRendimentos(registros).filter(function(r){return r.rendimento!==null;}).reduce(function(a,r){return a+r.rendimento;},0);
}
function rendimentoMes(registros) {
  var agora = new Date(), ano = agora.getFullYear(), mes = agora.getMonth();
  var regs = calcRendimentos(registros).filter(function(r){
    if(r.rendimento===null) return false;
    var d = new Date(r.data+"T12:00:00");
    return d.getFullYear()===ano && d.getMonth()===mes;
  });
  if (!regs.length) return null;
  return regs.reduce(function(a,r){return a+r.rendimento;},0);
}

// ── Resumo ────────────────────────────────────────────────
function renderSummary() {
  var ativas = caixinhas.filter(function(c){return c.ativo!==false;});
  var totalPat = ativas.reduce(function(acc,c){var u=c.registros[c.registros.length-1]; return acc+(u?u.saldo:0);},0);
  var totalMes = ativas.reduce(function(acc,c){return acc+(rendimentoMes(c.registros)||0);},0);
  var totalAcum = ativas.reduce(function(acc,c){return acc+(totalRendimento(c.registros)||0);},0);
  var temDados = ativas.some(function(c){return c.registros.length>0;});
  var patHTML = mascarar('<div class="summary-val">'+(temDados?fBRL(totalPat):"—")+'</div>');
  var mesHTML = mascarar('<div class="summary-val-sm" style="color:'+(totalMes>=0?'var(--green)':'var(--red)')+'">'+  (temDados?(totalMes>=0?"+":"")+fBRL(totalMes):"—")+'</div>');
  var acumHTML = mascarar('<div class="summary-val-sm" style="color:'+(totalAcum>=0?'var(--purple)':'var(--red)')+'">'+  (temDados?(totalAcum>=0?"+":"")+fBRL(totalAcum):"—")+'</div>');
  document.getElementById("summary-grid").innerHTML =
    '<div class="summary-item full"><div class="summary-label">Patrimônio total</div>'+patHTML+'</div>'+
    '<div class="summary-item"><div class="summary-label">Rendimento do mês</div>'+mesHTML+'</div>'+
    '<div class="summary-item"><div class="summary-label">Rendimento total</div>'+acumHTML+'</div>';
}

function mudarMes(delta) { mesAtual.setMonth(mesAtual.getMonth()+delta); renderChart(); }

function renderChart() {
  var ano=mesAtual.getFullYear(), mes=mesAtual.getMonth();
  document.getElementById("month-label").textContent = NOMES_MES[mes]+" "+ano;
  var agora=new Date();
  var futuro=ano>agora.getFullYear()||(ano===agora.getFullYear()&&mes>agora.getMonth());
  document.getElementById("nav-next").style.opacity=futuro?"0.2":"1";
  document.getElementById("nav-next").style.pointerEvents=futuro?"none":"auto";
  var canvas=document.getElementById("chart");
  var ctx=canvas.getContext("2d");
  var dpr=window.devicePixelRatio||1;
  var W=canvas.parentElement.clientWidth, H=160;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+"px"; canvas.style.height=H+"px";
  ctx.scale(dpr,dpr); ctx.clearRect(0,0,W,H);
  var diasNoMes=new Date(ano,mes+1,0).getDate();
  var datasets=caixinhas.map(function(c){
    var regs=calcRendimentos(c.registros).filter(function(r){
      if(r.rendimento===null) return false;
      var d=new Date(r.data+"T12:00:00");
      return d.getFullYear()===ano&&d.getMonth()===mes;
    });
    var acum=[]; for(var i=0;i<diasNoMes;i++) acum.push(0);
    regs.forEach(function(r){
      var dia=new Date(r.data+"T12:00:00").getDate()-1;
      for(var i=dia;i<diasNoMes;i++) acum[i]+=r.rendimento;
    });
    return acum;
  });
  var temDados=datasets.some(function(d){return d.some(function(v){return v!==0;});});
  if(!temDados){
    ctx.fillStyle="#2a3a55"; ctx.font="12px DM Mono,monospace"; ctx.textAlign="center";
    ctx.fillText("Nenhum registro neste mês",W/2,H/2);
    document.getElementById("chart-legend").innerHTML="";
    document.getElementById("chart-total").innerHTML="";
    return;
  }
  var padL=54,padR=12,padT=10,padB=28,cW=W-padL-padR,cH=H-padT-padB;
  var allVals=[]; datasets.forEach(function(d){d.forEach(function(v){allVals.push(v);});});
  var maxVal=Math.max.apply(null,allVals.concat([0.01]));
  var minVal=Math.min.apply(null,allVals.concat([0]));
  var range=maxVal-minVal||1;
  function xP(i){return padL+(i/(diasNoMes-1))*cW;}
  function yP(v){return padT+cH-((v-minVal)/range)*cH;}
  ctx.strokeStyle="#1E2E4A"; ctx.lineWidth=1;
  [0,0.25,0.5,0.75,1].forEach(function(t){var y=padT+t*cH; ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke();});
  datasets.forEach(function(data,ci){
    var cor=getHex(caixinhas[ci]);
    ctx.save(); ctx.globalAlpha=0.1; ctx.fillStyle=cor;
    ctx.beginPath(); ctx.moveTo(xP(0),yP(0));
    data.forEach(function(v,i){ctx.lineTo(xP(i),yP(v));});
    ctx.lineTo(xP(diasNoMes-1),yP(0)); ctx.closePath(); ctx.fill(); ctx.restore();
    ctx.strokeStyle=cor; ctx.lineWidth=2; ctx.lineJoin="round";
    ctx.beginPath();
    data.forEach(function(v,i){if(i===0)ctx.moveTo(xP(i),yP(v));else ctx.lineTo(xP(i),yP(v));});
    ctx.stroke();
    var lv=data[diasNoMes-1];
    if(lv!==0){ctx.fillStyle=cor;ctx.beginPath();ctx.arc(xP(diasNoMes-1),yP(lv),4,0,Math.PI*2);ctx.fill();}
  });
  ctx.fillStyle="#4A6080"; ctx.font="10px DM Mono,monospace"; ctx.textAlign="center";
  [0,7,14,21,diasNoMes-1].forEach(function(i){if(i<diasNoMes)ctx.fillText(i+1,xP(i),H-6);});
  ctx.textAlign="right";
  [0,0.5,1].forEach(function(t){var v=minVal+t*range; ctx.fillStyle="#4A6080"; ctx.fillText("R$"+(v>=0?"":"-")+Math.abs(v).toFixed(0),padL-4,yP(v)+4);});
  document.getElementById("chart-legend").innerHTML=caixinhas.map(function(c){
    return '<div class="legend-item"><div class="legend-dot" style="background:'+getHex(c)+'"></div><span>'+c.nome+'</span></div>';
  }).join("");
  var totalMes=datasets.reduce(function(acc,d){return acc+d[diasNoMes-1];},0);
  document.getElementById("chart-total").innerHTML=temDados
    ?'Total acumulado no mês: <span>'+(totalMes>=0?"+":"")+fBRL(totalMes)+'</span>':"";
}

        '<div class="metric-total">'+
          '<span class="metric-total-label">Rendimento total acumulado</span>'+
          '<span class="metric-total-val">'+(oculto?mascarar(rendTotalHTML):rendTotalHTML)+'</span>'+
        '</div>'+
        lastHTML+hist+
      '</div>';
  });
  renderChart();
}

function toggleExpandido(id){expandido[id]=!expandido[id];render();}

// ── Paleta de cores ───────────────────────────────────────
function swatchesHTML(corAtual) {
  return PALETTE.map(function(cor){
    var sel=cor===corAtual?' selected':'';
    return '<div class="color-swatch'+sel+'" style="background:'+cor+'" onclick="selecionarCor(\''+cor+'\')" title="'+cor+'"></div>';
  }).join('');
}
var corTemp = null;
function selecionarCor(cor) {
  corTemp = cor;
  document.querySelectorAll('.color-swatch').forEach(function(el){
    el.classList.toggle('selected', el.style.background===cor||el.getAttribute('style')==='background: '+cor||el.style.backgroundColor===hexToRgb(cor));
  });
  // Atualiza visualmente selecionando pelo onclick
  document.querySelectorAll('.color-swatch').forEach(function(el){
    el.classList.remove('selected');
  });
  event.target.classList.add('selected');
}
function hexToRgb(hex){return hex;} // simplificado

// ── Modais ────────────────────────────────────────────────
function abrirGerenciar() {
  modalState={tipo:"gerenciar"};
  document.getElementById("modal-title").textContent="Registrar saldo";
  document.getElementById("modal-sub").textContent="Escolha a caixinha";
  document.getElementById("modal-btns").style.display="none";
  renderGerenciarBody();
  document.getElementById("overlay").classList.add("open");
}

function renderGerenciarBody() {
  var ativas=caixinhas.filter(function(c){return c.ativo!==false;});
  var html='<div class="cx-list">';
  ativas.forEach(function(c){
    var cor=getHex(c);
    html+='<div class="cx-item" onclick="abrirSaldo('+c.id+')">'+
      '<div class="cx-item-left">'+
        '<div style="width:10px;height:10px;border-radius:50%;background:'+cor+';flex-shrink:0"></div>'+
        '<span class="cx-item-name">'+c.nome+'</span>'+
        '<span style="font-size:11px;padding:2px 8px;border-radius:20px;background:'+cor+'22;color:'+cor+';border:1px solid '+cor+'44">'+c.pct+'% CDI</span>'+
      '</div>'+
      '<div class="cx-actions" onclick="event.stopPropagation()">'+
        '<button class="cx-edit-btn" onclick="abrirConfig('+c.id+')">✎</button>'+
        '<button class="cx-del-btn" onclick="excluirCaixinha('+c.id+')">excluir</button>'+
      '</div>'+
    '</div>';
  });
  html+='</div><button class="new-cx-btn" onclick="abrirNovaCaixinha()">+ Nova caixinha</button>';
  document.getElementById("modal-body").innerHTML=html;
}

function inputStyle(){
  return 'background:var(--bg3);border:1px solid var(--border2);border-radius:12px;color:var(--text);font-family:\'DM Mono\',monospace;font-size:16px;padding:14px;width:100%;outline:none;';
}

function abrirSaldo(id){
  var c=caixinhas.find(function(x){return x.id===id;});
  modalState={tipo:"saldo",id:id};
  document.getElementById("modal-title").textContent="Registrar saldo";
  document.getElementById("modal-sub").textContent=c.nome;
  document.getElementById("modal-btns").style.display="flex";
  document.getElementById("confirm-btn").textContent="Salvar";
  document.getElementById("confirm-btn").className="confirm-btn confirm-green";
  document.getElementById("modal-body").innerHTML=
    '<button class="modal-back-btn" onclick="abrirGerenciar()">← voltar</button>'+
    '<div class="field"><label>Saldo atual (R$)</label><input type="number" inputmode="decimal" id="input-saldo" placeholder="0,00" /></div>'+
    '<div class="field"><label>Data</label><input type="date" id="input-data" value="'+hoje()+'" /></div>'+
    '<hr class="divider" /><div class="sec-label">MOVIMENTAÇÃO NO PERÍODO (opcional)</div>'+
    '<div class="field-row">'+
      '<div><label style="font-size:10px;color:var(--text3);letter-spacing:0.1em;display:block;margin-bottom:8px;text-transform:uppercase;">Depósito (R$)</label>'+
        '<input type="number" inputmode="decimal" id="input-entrada" placeholder="0,00" style="'+inputStyle()+'" />'+
        '<div class="field-hint">Dinheiro que você colocou</div></div>'+
      '<div><label style="font-size:10px;color:var(--text3);letter-spacing:0.1em;display:block;margin-bottom:8px;text-transform:uppercase;">Retirada (R$)</label>'+
        '<input type="number" inputmode="decimal" id="input-saida" placeholder="0,00" style="'+inputStyle()+'" />'+
        '<div class="field-hint">Dinheiro que você tirou</div></div>'+
    '</div>';
  setTimeout(function(){var el=document.getElementById("input-saldo");if(el)el.focus();},100);
}

function abrirConfig(id){
  var c=caixinhas.find(function(x){return x.id===id;});
  corTemp=getHex(c);
  modalState={tipo:"config",id:id};
  document.getElementById("modal-title").textContent="Configurar caixinha";
  document.getElementById("modal-sub").textContent="";
  document.getElementById("modal-btns").style.display="flex";
  document.getElementById("confirm-btn").textContent="Salvar";
  document.getElementById("confirm-btn").className="confirm-btn confirm-purple";
  document.getElementById("modal-body").innerHTML=
    '<button class="modal-back-btn" onclick="abrirGerenciar()">← voltar</button>'+
    '<div class="field"><label>Nome</label><input type="text" id="input-nome" value="'+c.nome+'" /></div>'+
    '<div class="field"><label>% do CDI</label><input type="number" inputmode="decimal" id="input-pct" value="'+c.pct+'" placeholder="ex: 121" /></div>'+
    '<div class="field"><label>Cor do card</label><div class="color-picker-row">'+swatchesHTML(corTemp)+'</div></div>';
  setTimeout(function(){var el=document.getElementById("input-nome");if(el)el.focus();},100);
}

function abrirNovaCaixinha(){
  corTemp=PALETTE[0];
  modalState={tipo:"nova"};
  document.getElementById("modal-title").textContent="Nova caixinha";
  document.getElementById("modal-sub").textContent="";
  document.getElementById("modal-btns").style.display="flex";
  document.getElementById("confirm-btn").textContent="Criar";
  document.getElementById("confirm-btn").className="confirm-btn confirm-green";
  document.getElementById("modal-body").innerHTML=
    '<button class="modal-back-btn" onclick="abrirGerenciar()">← voltar</button>'+
    '<div class="field"><label>Nome</label><input type="text" id="input-nome" placeholder="ex: PicPay 3" /></div>'+
    '<div class="field"><label>% do CDI</label><input type="number" inputmode="decimal" id="input-pct" placeholder="ex: 121" /></div>'+
    '<div class="field"><label>Cor do card</label><div class="color-picker-row">'+swatchesHTML(corTemp)+'</div></div>';
  setTimeout(function(){var el=document.getElementById("input-nome");if(el)el.focus();},100);
}

function excluirCaixinha(id){
  var c=caixinhas.find(function(x){return x.id===id;});
  if(!confirm('Excluir "'+c.nome+'"? Os dados sumirão do card mas ficam no gráfico.')) return;
  caixinhas=caixinhas.map(function(cx){return cx.id===id?Object.assign({},cx,{ativo:false}):cx;});
  salvarDados(); renderGerenciarBody(); render();
}

function closeModal(){
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("modal-btns").style.display="flex";
  modalState=null; corTemp=null;
}
function fecharModal(e){if(e.target===document.getElementById("overlay"))closeModal();}

function confirmar(){
  if(!modalState) return;
  if(modalState.tipo==="saldo"){
    var saldoEl=document.getElementById("input-saldo");
    var saldo=parseFloat(saldoEl?saldoEl.value:"");
    var dataEl=document.getElementById("input-data");
    var data=dataEl?dataEl.value:hoje();
    var entradaEl=document.getElementById("input-entrada");
    var entrada=parseFloat(entradaEl?entradaEl.value:"")||0;
    var saidaEl=document.getElementById("input-saida");
    var saida=parseFloat(saidaEl?saidaEl.value:"")||0;
    if(!saldo||saldo<=0){if(saldoEl)saldoEl.focus();return;}
    caixinhas=caixinhas.map(function(c){
      if(c.id!==modalState.id) return c;
      var novos=c.registros.concat([{id:Date.now(),data:data,saldo:saldo,entrada:entrada,saida:saida}]);
      novos.sort(function(a,b){return a.data.localeCompare(b.data);});
      return Object.assign({},c,{registros:novos});
    });
  } else if(modalState.tipo==="config"){
    var nomeEl=document.getElementById("input-nome");
    var nome=nomeEl?nomeEl.value.trim():"";
    var pctEl=document.getElementById("input-pct");
    var pct=parseFloat(pctEl?pctEl.value:"");
    caixinhas=caixinhas.map(function(c){
      return c.id===modalState.id?Object.assign({},c,{nome:nome||c.nome,pct:pct||c.pct,cor:corTemp||getHex(c)}):c;
    });
  } else if(modalState.tipo==="nova"){
    var nomeEl2=document.getElementById("input-nome");
    var nome2=nomeEl2?nomeEl2.value.trim():"";
    var pctEl2=document.getElementById("input-pct");
    var pct2=parseFloat(pctEl2?pctEl2.value:"");
    if(!nome2||!pct2) return;
    var newId=Math.max.apply(null,caixinhas.map(function(c){return c.id;}))+1;
    caixinhas.push({id:newId,nome:nome2,pct:pct2,cor:corTemp||PALETTE[0],registros:[],ativo:true});
  }
  salvarDados(); closeModal(); render();
  showToast("✓ Salvo com sucesso!");
}

function remover(caixinhaId,regId){
  if(!confirm("Remover este registro?")) return;
  caixinhas=caixinhas.map(function(c){
    return c.id===caixinhaId?Object.assign({},c,{registros:c.registros.filter(function(r){return r.id!==regId;})}):c;
  });
  salvarDados(); render();
}

function exportarBackup(){
  var blob=new Blob([JSON.stringify(caixinhas,null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url; a.download="caixinha-backup-"+new Date().toISOString().split("T")[0]+".json";
  a.click(); URL.revokeObjectURL(url);
}

function importarBackup(event){
  var file=event.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var dados=JSON.parse(e.target.result);
      if(!Array.isArray(dados)) throw new Error();
      if(confirm("Isso vai substituir os dados atuais. Confirma?")){
        caixinhas=dados; salvarDados(); render(); showToast("✓ Backup restaurado!");
      }
    }catch(err){alert("Arquivo inválido.");}
  };
  reader.readAsText(file); event.target.value="";
}

document.addEventListener("keydown",function(e){
  if(e.key==="Enter"&&modalState&&modalState.tipo!=="gerenciar") confirmar();
  if(e.key==="Escape") closeModal();
});

render();
</script>
</body>
</html>
