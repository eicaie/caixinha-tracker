<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Caixinha"/>
<title>Caixinha</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet" media="print" onload="this.media='all'"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#060B14;--bg2:#0C1525;--bg3:#111E30;--bg4:#17263D;
  --glass:rgba(255,255,255,0.04);--glass2:rgba(255,255,255,0.07);--glass3:rgba(255,255,255,0.11);
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--border3:rgba(255,255,255,0.22);
  --text:#EEF3FF;--text2:#7A96BE;--text3:#344D68;
  --green:#00D68F;--red:#FF3B55;--orange:#FF9F0A;--purple:#BF5AF2;--blue:#0A84FF;
  --tab-h:80px;
  --safe-top:env(safe-area-inset-top,44px);
  --safe-bot:env(safe-area-inset-bottom,20px);
}
html,body{height:100%;-webkit-font-smoothing:antialiased;}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',system-ui,-apple-system,sans-serif;
  /* FIX: padding correto para tab bar + safe area */
  padding-bottom:calc(var(--tab-h) + var(--safe-bot) + 24px);
  overflow-x:hidden;min-height:100vh;
}

.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(90px);}
.orb1{width:360px;height:360px;top:-100px;right:-100px;background:radial-gradient(circle,rgba(10,132,255,0.12) 0%,transparent 70%);}
.orb2{width:280px;height:280px;bottom:220px;left:-120px;background:radial-gradient(circle,rgba(0,214,143,0.09) 0%,transparent 70%);}
.orb3{width:200px;height:200px;top:42%;right:-60px;background:radial-gradient(circle,rgba(191,90,242,0.07) 0%,transparent 70%);}

.content{position:relative;z-index:1;}
.safe-top{height:calc(var(--safe-top) + 4px);min-height:48px;}

/* Pages */
.pg{display:none;}.pg.on{display:block;}

/* Page header */
.pg-hd{display:flex;align-items:center;justify-content:space-between;padding:4px 20px 20px;}
.pg-title{font-size:30px;font-weight:800;letter-spacing:-0.04em;}
.hd-actions{display:flex;gap:8px;}
.icon-btn{width:38px;height:38px;border-radius:50%;background:var(--glass2);border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;transition:transform .12s,opacity .12s;}
.icon-btn:active{transform:scale(0.88);opacity:.6;}

/* Hero */
.hero{
  margin:0 16px 20px;
  background:linear-gradient(140deg,rgba(10,132,255,0.13) 0%,rgba(0,214,143,0.07) 55%,rgba(191,90,242,0.05) 100%);
  border:0.5px solid var(--border2);border-radius:28px;padding:24px 22px 20px;
  position:relative;overflow:hidden;
}
.hero::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,0.055) 0%,transparent 60%);pointer-events:none;}
.hero::after{content:'';position:absolute;top:0;left:0;right:0;height:0.5px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22) 35%,rgba(255,255,255,0.1) 65%,transparent);}
.hero-lbl{font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin-bottom:10px;}
.hero-val{font-size:50px;font-weight:800;letter-spacing:-0.045em;line-height:1;margin-bottom:18px;}
.hero-val .cur{font-size:22px;font-weight:600;opacity:.55;vertical-align:top;margin-top:7px;display:inline-block;margin-right:2px;}
.hero-pills{display:flex;gap:7px;flex-wrap:wrap;}
.hpill{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;background:rgba(0,0,0,0.28);border:0.5px solid var(--border2);}

/* Section header */
.sh{display:flex;align-items:center;padding:0 20px;margin-bottom:10px;}
.sh-title{font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;}

/* Glass card */
.gc{margin:0 16px 14px;background:var(--glass);border:0.5px solid var(--border);border-radius:22px;padding:18px 16px;position:relative;overflow:hidden;}
.gc::after{content:'';position:absolute;top:0;left:0;right:0;height:0.5px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1) 40%,rgba(255,255,255,0.05) 70%,transparent);pointer-events:none;}

/* Divider */
.dv{height:0.5px;background:var(--border);margin:6px 20px 22px;}

/* Month pills */
.month-scroll{display:flex;gap:6px;padding:0 16px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.month-scroll::-webkit-scrollbar{display:none;}
.mpill{padding:8px 15px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;background:var(--glass);border:0.5px solid var(--border);color:var(--text3);transition:all .15s;white-space:nowrap;}
.mpill.on{background:rgba(10,132,255,0.14);color:var(--blue);border-color:rgba(10,132,255,0.28);}

/* Chart */
.ckv-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:4px;}
.ckv-val{font-size:26px;font-weight:800;letter-spacing:-0.03em;margin-bottom:14px;}
.chart-area{height:130px;position:relative;}
.chart-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
.cl-item{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--text2);}
.cl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* Month summary */
.ms-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.ms-total{font-size:24px;font-weight:800;letter-spacing:-.03em;}
.ms-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.ms-badge{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;align-self:flex-start;}
.ms-rows{display:flex;flex-direction:column;gap:6px;}
.ms-row{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.22);border-radius:14px;padding:12px 13px;border:0.5px solid rgba(255,255,255,0.025);}
.ms-row-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ms-row-info{flex:1;min-width:0;}
.ms-row-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ms-row-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.ms-bar-w{height:2px;border-radius:2px;background:rgba(255,255,255,0.05);margin-top:8px;}
.ms-bar-f{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.34,1.56,.64,1);}
.ms-row-rend{font-size:13px;font-weight:700;text-align:right;flex-shrink:0;}
.ms-inativa{opacity:.5;}

/* Caixinha card */
.cx-card{margin:0 16px 10px;border-radius:22px;border:0.5px solid var(--border);background:var(--glass);position:relative;overflow:hidden;}
.cx-card::after{content:'';position:absolute;top:0;left:0;right:0;height:0.5px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.09) 40%,rgba(255,255,255,0.05) 70%,transparent);pointer-events:none;}
.cx-accent{position:absolute;top:0;left:0;bottom:0;width:3px;border-radius:22px 0 0 22px;}
.cx-body{padding:18px 16px 14px 20px;}
.cx-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.cx-name-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.cx-pulse{width:7px;height:7px;border-radius:50%;animation:pulse 2.5s ease-in-out infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.85)}}
.cx-name{font-size:15px;font-weight:700;}
.cx-cdi{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.cx-right{text-align:right;padding-left:12px;flex-shrink:0;}
.cx-saldo-lbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:3px;}
.cx-saldo-val{font-size:22px;font-weight:800;letter-spacing:-.025em;}
.cx-mets{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:13px;}
.cx-met{background:rgba(0,0,0,0.22);border-radius:13px;padding:10px 12px;border:0.5px solid rgba(255,255,255,0.025);}
.cx-met-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:4px;}
.cx-met-val{font-size:14px;font-weight:700;}
.cx-tbl-s{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:2px;}
.cx-tbl-hd{display:grid;grid-template-columns:68px 1fr 70px 1fr 24px;gap:4px;padding:0 8px 6px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;min-width:300px;}
.cx-row{display:grid;grid-template-columns:68px 1fr 70px 1fr 24px;gap:4px;align-items:center;padding:10px 8px;background:rgba(0,0,0,0.18);border-radius:11px;margin-bottom:4px;min-width:300px;border:0.5px solid rgba(255,255,255,0.018);}
.cx-r-date{font-size:11px;color:var(--text3);}
.cx-r-saldo{font-size:12px;font-weight:600;}
.cx-r-ent{font-size:11px;color:var(--green);}
.cx-r-sai{font-size:11px;color:var(--orange);}
.cx-r-none{font-size:11px;color:var(--text3);}
.cx-r-pos{font-size:11px;font-weight:700;color:var(--green);}
.cx-r-neg{font-size:11px;font-weight:700;color:var(--red);}
.cx-r-del{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0;width:24px;text-align:center;line-height:1;}
.cx-r-del:active{color:var(--red);}
.cx-empty{text-align:center;font-size:12px;color:var(--text3);padding:20px 0;}
.ver-mais{width:100%;background:none;border:0.5px solid var(--border);border-radius:10px;padding:8px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;margin:5px 0;}
/* FIX: footer do card sempre visível */
.cx-footer{display:flex;gap:6px;padding:10px 14px 14px;border-top:0.5px solid var(--border);}
.cx-btn-e{flex:1;background:var(--glass);border:0.5px solid var(--border2);border-radius:12px;padding:11px 10px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;text-align:center;}
.cx-btn-r{flex:2;background:rgba(10,132,255,0.15);color:var(--blue);border:0.5px solid rgba(10,132,255,0.28);border-radius:12px;padding:11px 10px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;text-align:center;}
.cx-btn-e:active,.cx-btn-r:active{opacity:.6;}

/* Dados page */
.data-card{background:var(--glass);border:0.5px solid var(--border);border-radius:18px;overflow:hidden;margin:0 16px 12px;}
.data-row{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:0.5px solid var(--border);cursor:pointer;}
.data-row:last-child{border-bottom:none;}
.data-row:active{background:rgba(255,255,255,0.03);}
.data-row-l{display:flex;align-items:center;gap:12px;}
.data-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.ico-g{background:rgba(0,214,143,0.12);}
.ico-p{background:rgba(191,90,242,0.12);}
.ico-b{background:rgba(10,132,255,0.12);}
.ico-o{background:rgba(255,159,10,0.12);}
.data-row-title{font-size:15px;font-weight:600;}
.data-row-sub{font-size:12px;color:var(--text3);margin-top:1px;}
.data-row-chev{color:var(--text3);font-size:20px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;}
.stat-box{background:rgba(0,0,0,0.22);border-radius:12px;padding:12px;border:0.5px solid rgba(255,255,255,0.03);}
.stat-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:4px;}
.stat-val{font-size:14px;font-weight:700;}

/* ── Tab bar ── */
.tab-bar{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--tab-h) + var(--safe-bot));
  background:rgba(6,11,20,0.86);
  border-top:0.5px solid var(--border2);
  backdrop-filter:saturate(180%) blur(28px);
  -webkit-backdrop-filter:saturate(180%) blur(28px);
  z-index:200;display:flex;align-items:flex-start;justify-content:space-around;padding-top:10px;
}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;width:76px;padding:2px 0;transition:opacity .15s;}
.tab-item:active{opacity:.45;}
.tab-icon-wrap{
  width:38px;height:26px;display:flex;align-items:center;justify-content:center;
  border-radius:13px;transition:background .2s;
}
.tab-item.on .tab-icon-wrap{background:rgba(10,132,255,0.15);}
.tab-svg{width:22px;height:22px;}
.tab-label{font-size:10px;font-weight:600;letter-spacing:.02em;}
.tab-item.on .tab-label{color:var(--blue);}
.tab-item:not(.on) .tab-label{color:var(--text3);}
.tab-center{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,#0A84FF 0%,#0060CC 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(10,132,255,0.45),0 1px 4px rgba(0,0,0,0.3);
  font-size:26px;color:#fff;font-weight:300;cursor:pointer;
  transform:translateY(-8px);
  transition:transform .12s,box-shadow .12s;
  border:0.5px solid rgba(255,255,255,0.18);
}
.tab-center:active{transform:translateY(-5px) scale(.9);box-shadow:0 2px 10px rgba(10,132,255,0.3);}

/* Toast */
.toast{
  position:fixed;bottom:calc(var(--tab-h) + var(--safe-bot) + 12px);left:50%;
  transform:translateX(-50%) translateY(10px);
  background:rgba(6,11,20,0.97);border:0.5px solid var(--border3);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  color:var(--green);border-radius:30px;padding:11px 24px;
  font-size:13px;font-weight:600;
  opacity:0;transition:opacity .2s,transform .22s cubic-bezier(.34,1.56,.64,1);
  z-index:500;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Bottom sheet */
.overlay{display:none;position:fixed;inset:0;background:rgba(2,6,16,0.74);z-index:300;align-items:flex-end;justify-content:center;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.overlay.open{display:flex;}
.sheet{
  background:var(--bg2);border:0.5px solid var(--border2);
  border-radius:28px 28px 0 0;
  padding:16px 20px 24px;width:100%;max-width:700px;
  animation:slideUp .25s cubic-bezier(.32,.72,0,1);
  max-height:92vh;overflow-y:auto;
  padding-bottom:calc(24px + var(--safe-bot));
}
@media(min-height:700px){.overlay{align-items:center;}.sheet{border-radius:28px;max-width:440px;padding-bottom:24px;}}
@keyframes slideUp{from{transform:translateY(52px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:36px;height:5px;border-radius:3px;background:rgba(255,255,255,0.1);margin:0 auto 20px;}
.sheet-title{font-size:20px;font-weight:800;letter-spacing:-.025em;margin-bottom:4px;}
.sheet-sub{font-size:12px;color:var(--text3);margin-bottom:20px;}
.field{margin-bottom:13px;}
.field label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em;display:block;margin-bottom:7px;text-transform:uppercase;}
.field input,.field select{background:var(--bg3);border:0.5px solid var(--border2);border-radius:14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;padding:14px;width:100%;outline:none;transition:border-color .2s;-webkit-appearance:none;}
.field input:focus,.field select:focus{border-color:var(--blue);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px;}
.frow label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em;display:block;margin-bottom:7px;text-transform:uppercase;}
.frow input{background:var(--bg3);border:0.5px solid var(--border2);border-radius:14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;padding:14px;width:100%;outline:none;transition:border-color .2s;}
.frow input:focus{border-color:var(--blue);}
.field-hint{font-size:10px;color:var(--text3);margin-top:4px;}
.mdiv{border:none;border-top:0.5px solid var(--border);margin:14px 0;}
.m-sec{font-size:11px;color:var(--text3);margin-bottom:10px;}
.sheet-btns{display:flex;gap:8px;margin-top:20px;}
.btn-cancel{flex:1;background:var(--bg3);color:var(--text2);border:0.5px solid var(--border);border-radius:14px;padding:15px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
.btn-ok{flex:2;border:none;border-radius:14px;padding:15px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-green{background:var(--green);color:#000;}
.btn-purple{background:var(--purple);color:#fff;}
.back-btn{background:none;border:none;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:14px;padding:0;}

/* Mode selector */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;}
.mode-btn{
  background:var(--bg3);border:0.5px solid var(--border2);border-radius:16px;
  padding:13px 10px;text-align:center;cursor:pointer;transition:all .15s;
}
.mode-btn:active{opacity:.7;}
.mode-btn.on{border-color:var(--blue);background:rgba(10,132,255,0.1);}
.mode-btn .m-ico{font-size:20px;margin-bottom:6px;}
.mode-btn .m-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px;}
.mode-btn .m-sub{font-size:10px;color:var(--text3);line-height:1.4;}
.mode-btn.on .m-title{color:var(--blue);}

/* cx list */
.cx-list{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;}
.cx-li{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;background:var(--bg3);border-radius:14px;cursor:pointer;border:0.5px solid var(--border2);}
.cx-li:active{opacity:.7;}
.cx-li-l{display:flex;align-items:center;gap:9px;}
.cx-li-name{font-size:14px;font-weight:600;}
.cx-li-actions{display:flex;gap:5px;}
.cla-btn{border:none;border-radius:8px;padding:5px 9px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;}
.cla-del{background:rgba(255,59,85,0.1);color:var(--red);}
.cla-edit{background:var(--bg4);color:var(--text2);}
.new-cx-btn{width:100%;background:none;border:0.5px dashed var(--border2);border-radius:14px;padding:13px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;margin-top:4px;}

/* palette — 24 cores, sem repetição */
.palette{display:flex;flex-wrap:wrap;gap:8px;}
.sw{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;}
.sw.on{border-color:#fff;transform:scale(1.18);}

.hval{color:var(--text3);letter-spacing:.18em;font-size:.8em;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.au{animation:fadeUp .3s ease both;}
.au2{animation-delay:.06s;}.au3{animation-delay:.12s;}.au4{animation-delay:.18s;}.au5{animation-delay:.24s;}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
<div class="content">
  <div class="safe-top"></div>

  <!-- HOME -->
  <div class="pg on" id="pg-home">
    <div class="pg-hd">
      <span class="pg-title">Carteira</span>
      <div class="hd-actions">
        <div class="icon-btn" id="eye-btn" onclick="toggleOcultar()">👁</div>
      </div>
    </div>
    <div class="hero au" id="hero-card">
      <div class="hero-lbl">Patrimônio total</div>
      <div class="hero-val" id="hero-val"><span class="cur">R$</span>—</div>
      <div class="hero-pills" id="hero-pills"></div>
    </div>
    <div class="sh au au2"><span class="sh-title">Rendimento acumulado</span></div>

function load(){
  try{
    var r=localStorage.getItem(SK);
    if(r){var d=JSON.parse(r);if(d&&Array.isArray(d)&&d.length>0)return d.map(function(c,i){if(!c.cor)c.cor=PALETTE[i%PALETTE.length];if(c.ativo===undefined)c.ativo=true;if(!c.registros)c.registros=[];return c;});}
  }catch(e){}
  localStorage.setItem(SK,JSON.stringify(BACKUP));
  return JSON.parse(JSON.stringify(BACKUP));
}
function save(){localStorage.setItem(SK,JSON.stringify(cx));}
var cx=load(),modalState=null,corTemp=null,oculto=false,expandido={},mesSel=null,statsOpen=false;

function getHex(c){return c.cor||PALETTE[c.id%PALETTE.length]||"#0A84FF";}
function fBRL(v){return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});}
function fData(d){return new Date(d+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit"});}
function hoje(){return new Date().toISOString().split("T")[0];}
function hv(v){return oculto?'<span class="hval">••••</span>':v;}
function toast(m,cor){var t=document.getElementById("toast");t.textContent=m;t.style.color=cor||"var(--green)";t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2400);}
function toggleOcultar(){oculto=!oculto;document.getElementById("eye-btn").textContent=oculto?"🙈":"👁";render();}

function calcR(regs){
  return regs.map(function(r,i){
    if(i===0)return Object.assign({},r,{rendimento:null});
    var a=regs[i-1];
    return Object.assign({},r,{rendimento:r.saldo-a.saldo-(r.entrada||0)+(r.saida||0)});
  });
}
function totalR(regs){if(!regs||regs.length<2)return null;return calcR(regs).filter(function(r){return r.rendimento!==null;}).reduce(function(a,r){return a+r.rendimento;},0);}
function rendMesAno(regs,ano,mes){
  var rs=calcR(regs).filter(function(r){if(r.rendimento===null)return false;var d=new Date(r.data+"T12:00:00");return d.getFullYear()===ano&&d.getMonth()===mes;});
  if(!rs.length)return null;
  return rs.reduce(function(a,r){return a+r.rendimento;},0);
}
function rendMesAtual(regs){var n=new Date();return rendMesAno(regs,n.getFullYear(),n.getMonth());}

function getMeses(){
  var set={};
  cx.forEach(function(c){c.registros.forEach(function(r){var d=new Date(r.data+"T12:00:00");set[d.getFullYear()+"-"+String(d.getMonth()).padStart(2,"0")]=true;});});
  return Object.keys(set).sort().reverse().map(function(k){var p=k.split("-");return{ano:parseInt(p[0]),mes:parseInt(p[1])};});
}

function navTo(pg){
  document.querySelectorAll(".pg").forEach(function(el){el.classList.remove("on");});
  document.querySelectorAll(".tab-item").forEach(function(el){el.classList.remove("on");});
  document.getElementById("pg-"+pg).classList.add("on");
  document.getElementById("tab-"+pg).classList.add("on");
  if(pg==="dados")renderDados();
  window.scrollTo(0,0);
}

function renderHero(){
  var ativas=cx.filter(function(c){return c.ativo!==false;});
  var pat=ativas.reduce(function(a,c){var u=c.registros[c.registros.length-1];return a+(u?u.saldo:0);},0);
  var tmTodas=cx.reduce(function(a,c){return a+(rendMesAtual(c.registros)||0);},0);
  var taTodas=cx.reduce(function(a,c){return a+(totalR(c.registros)||0);},0);
  if(oculto){
    document.getElementById("hero-val").innerHTML='<span class="hval" style="font-size:34px;letter-spacing:.2em">••••••</span>';
  } else {
    var fmtd=fBRL(pat).replace("R$","").trim();
    document.getElementById("hero-val").innerHTML='<span class="cur">R$</span>'+fmtd;
  }
  var pills='<div class="hpill" style="color:var(--green)">'+(tmTodas>=0?"▲":"▼")+" "+hv(fBRL(Math.abs(parseFloat(tmTodas.toFixed(2)))))+" mês</div>";
  pills+='<div class="hpill" style="color:var(--purple)">★ '+hv(fBRL(parseFloat(taTodas.toFixed(2))))+" total</div>";
  pills+='<div class="hpill" style="color:var(--blue)">◉ '+ativas.length+" ativas</div>";
  document.getElementById("hero-pills").innerHTML=pills;
}

function renderMonthPills(){
  var meses=getMeses();
  if(!meses.length){document.getElementById("month-pills").innerHTML="";return;}
  if(!mesSel)mesSel=meses[0];
  document.getElementById("month-pills").innerHTML=meses.map(function(m){
    var on=mesSel&&mesSel.ano===m.ano&&mesSel.mes===m.mes?" on":"";
    return '<div class="mpill'+on+'" onclick="selecionarMes('+m.ano+','+m.mes+')">'+MESES[m.mes]+" "+m.ano+"</div>";
  }).join("");
}
function selecionarMes(ano,mes){mesSel={ano:ano,mes:mes};renderMonthPills();renderChart();renderMonthSummary();}

function renderChart(){
  if(!mesSel)return;
  var canvas=document.getElementById("main-chart");
  if(!canvas)return;
  var W=canvas.parentElement?canvas.parentElement.clientWidth:0;
  if(W<10){requestAnimationFrame(renderChart);return;}
  var ano=mesSel.ano,mes=mesSel.mes;
  var dim=new Date(ano,mes+1,0).getDate();
  var datasets=cx.map(function(c){
    var regs=calcR(c.registros).filter(function(r){
      if(r.rendimento===null)return false;
      var d=new Date(r.data+"T12:00:00");
      return d.getFullYear()===ano&&d.getMonth()===mes;
    });
    var acum=[],run=0;
    for(var i=0;i<dim;i++){var dia=i+1;regs.forEach(function(r){if(new Date(r.data+"T12:00:00").getDate()===dia)run+=r.rendimento;});acum.push(parseFloat(Math.max(0,run).toFixed(4)));}
    return{label:c.nome,data:acum,cor:getHex(c),ativo:c.ativo!==false};
  });
  var totalPeriodo=datasets.reduce(function(a,ds){return a+(ds.data[dim-1]||0);},0);
  var cor=totalPeriodo>=0?"var(--green)":"var(--red)";
  document.getElementById("chart-kv").innerHTML='<span style="color:'+cor+'">'+hv((totalPeriodo>=0?"+":"")+fBRL(parseFloat(totalPeriodo.toFixed(2))))+'</span>';
  var ctx=canvas.getContext("2d");
  var dpr=window.devicePixelRatio||1;
  var H=130;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+"px";canvas.style.height=H+"px";
  ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
  var pL=46,pR=8,pT=8,pB=24,cW=W-pL-pR,cH=H-pT-pB;
  var stacked=[];
  for(var i=0;i<dim;i++){stacked.push(datasets.reduce(function(a,ds){return a+(ds.data[i]||0);},0));}
  var maxVal=Math.max.apply(null,stacked.concat([0.01]));
  function xBar(i){return pL+(i/dim)*cW;}
  function barW(){return Math.max(1,cW/dim-1);}
  function yH(v){return(v/maxVal)*cH;}
  ctx.strokeStyle="rgba(255,255,255,0.04)";ctx.lineWidth=0.5;
  [0.25,0.5,0.75,1].forEach(function(t){var y=pT+cH-t*cH;ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(W-pR,y);ctx.stroke();});
  for(var d2=0;d2<dim;d2++){
    var baseY=pT+cH;
    datasets.forEach(function(ds){
      var v=ds.data[d2]||0;if(v<=0)return;
      var h=yH(v),x=xBar(d2),bw=barW(),r=2;
      ctx.fillStyle=ds.cor+(ds.ativo?"CC":"44");
      ctx.beginPath();ctx.moveTo(x+r,baseY-h);ctx.lineTo(x+bw-r,baseY-h);
      ctx.quadraticCurveTo(x+bw,baseY-h,x+bw,baseY-h+r);
      ctx.lineTo(x+bw,baseY);ctx.lineTo(x,baseY);ctx.lineTo(x,baseY-h+r);
      ctx.quadraticCurveTo(x,baseY-h,x+r,baseY-h);ctx.closePath();ctx.fill();
      baseY-=h;
    });
  }
  ctx.fillStyle="#344D68";ctx.font="9px DM Sans,sans-serif";ctx.textAlign="right";
  [0,0.5,1].forEach(function(t){var v=t*maxVal;ctx.fillText("R$"+v.toFixed(0),pL-4,pT+cH-t*cH+3);});
  ctx.textAlign="center";
  [0,7,14,21,dim-1].forEach(function(i){if(i<dim)ctx.fillText(i+1,xBar(i)+barW()/2,H-6);});
  document.getElementById("chart-legend").innerHTML=cx.map(function(c){
    return '<div class="cl-item"'+(c.ativo===false?' style="opacity:.5"':"")+'><div class="cl-dot" style="background:'+getHex(c)+'"></div>'+c.nome+'</div>';
  }).join("");
}

function renderMonthSummary(){
  if(!mesSel){document.getElementById("month-summary").innerHTML='<div style="text-align:center;color:var(--text3);padding:24px;font-size:12px">Sem dados</div>';return;}
  var ano=mesSel.ano,mes=mesSel.mes;
  var totalRend=0,totalDep=0,totalRet=0,maxR=0;
  var rows=cx.map(function(c){
    var rend=rendMesAno(c.registros,ano,mes)||0;
    var regsM=c.registros.filter(function(r){var d=new Date(r.data+"T12:00:00");return d.getFullYear()===ano&&d.getMonth()===mes;});
    var dep=regsM.reduce(function(a,r){return a+(r.entrada||0);},0);
    var ret=regsM.reduce(function(a,r){return a+(r.saida||0);},0);
    var ult=regsM.length?regsM[regsM.length-1]:null;
    totalRend+=rend;totalDep+=dep;totalRet+=ret;
    if(Math.abs(rend)>maxR)maxR=Math.abs(rend);
    return{c:c,rend:rend,dep:dep,ret:ret,saldo:ult?ult.saldo:null};
  }).filter(function(r){return r.saldo!==null||r.rend!==0;});
  if(!rows.length){document.getElementById("month-summary").innerHTML='<div style="text-align:center;color:var(--text3);padding:20px;font-size:12px">Sem lançamentos em '+MESES[mes]+" "+ano+'</div>';return;}
  var rc=totalRend>=0?"var(--green)":"var(--red)";
  var rs=(totalRend>=0?"+":"")+fBRL(parseFloat(totalRend.toFixed(2)));
  var badgeStyle=totalRend>=0?"background:rgba(0,214,143,0.1);color:var(--green);border:0.5px solid rgba(0,214,143,0.2)":"background:rgba(255,59,85,0.1);color:var(--red);border:0.5px solid rgba(255,59,85,0.2)";
  var html='<div class="ms-head"><div><div class="ms-total" style="color:'+rc+'">'+hv(rs)+'</div><div class="ms-sub">'+MESES[mes]+" "+ano+(totalDep>0?" · dep. "+fBRL(parseFloat(totalDep.toFixed(2))):"")+(totalRet>0?" · ret. "+fBRL(parseFloat(totalRet.toFixed(2))):"")+'</div></div>'+
    '<div class="ms-badge" style="'+badgeStyle+'">'+(totalRend>=0?"↑ ":"↓ ")+hv(fBRL(Math.abs(parseFloat(totalRend.toFixed(2)))))+'</div></div><div class="ms-rows">';
  rows.forEach(function(row){
    var cor=getHex(row.c);
    var rStr=(row.rend>=0?"+":"")+fBRL(parseFloat(row.rend.toFixed(2)));
    var rCor=row.rend>=0?"var(--green)":"var(--red)";
    var pct=maxR>0?Math.round(Math.abs(row.rend)/maxR*100):0;
    var inativa=row.c.ativo===false?' class="ms-row ms-inativa"':'class="ms-row"';
    var movStr="";
    if(row.dep>0)movStr+='<span style="color:var(--green)">+'+fBRL(parseFloat(row.dep.toFixed(2)))+" dep</span>";
    if(row.ret>0)movStr+=(movStr?" · ":'')+'<span style="color:var(--orange)">-'+fBRL(parseFloat(row.ret.toFixed(2)))+" ret</span>";
    html+='<div '+inativa+'><div class="ms-row-dot" style="background:'+cor+'"></div>'+
      '<div class="ms-row-info"><div class="ms-row-name">'+row.c.nome+(row.c.ativo===false?' <span style="font-size:10px;color:var(--text3)">(inativa)</span>':"")+'</div>'+
      '<div class="ms-row-sub">'+(row.saldo!==null?hv("saldo "+fBRL(row.saldo)):"")+(movStr?" · "+movStr:"")+'</div>'+
      '<div class="ms-bar-w"><div class="ms-bar-f" style="width:'+pct+'%;background:'+cor+'"></div></div></div>'+
      '<div class="ms-row-rend" style="color:'+rCor+'">'+hv(rStr)+'</div></div>';
  });
  html+='</div>';
  document.getElementById("month-summary").innerHTML=html;
}

function renderCards(){
  var ativas=cx.filter(function(c){return c.ativo!==false;});
  if(!ativas.length){document.getElementById("cx-cards").innerHTML='<div style="text-align:center;color:var(--text3);padding:32px;font-size:13px">Nenhuma caixinha ativa</div>';return;}
  var html="";
  ativas.forEach(function(c){
    var cor=getHex(c);
    var regs=calcR(c.registros);
    var tR=totalR(c.registros);
    var mR=rendMesAtual(c.registros);
    var ult=c.registros[c.registros.length-1];
    var saldo=ult?fBRL(ult.saldo):"—";
    var mStr=mR!==null?(mR>=0?"+":"")+fBRL(parseFloat(mR.toFixed(2))):"—";
    var mCor=mR===null?"var(--text3)":(mR>=0?"var(--green)":"var(--red)");
    var tStr=tR!==null?(tR>=0?"+":"")+fBRL(parseFloat(tR.toFixed(2))):"—";
    var tCor=tR===null?"var(--text3)":(tR>=0?"var(--green)":"var(--red)");
    var rev=regs.slice().reverse();
    var vis=expandido[c.id]?rev:rev.slice(0,5);
    var rows="";
    vis.forEach(function(r){
      var e=r.entrada||0,s=r.saida||0;
      var mCls="cx-r-none",mS="—";
      if(e>0){mCls="cx-r-ent";mS="+"+fBRL(e);}
      else if(s>0){mCls="cx-r-sai";mS="-"+fBRL(s);}
      var rCls="cx-r-none",rS="—";
      if(r.rendimento!==null){rCls=r.rendimento>=0?"cx-r-pos":"cx-r-neg";rS=(r.rendimento>=0?"+":"")+fBRL(parseFloat(r.rendimento.toFixed(2)));}
      rows+='<div class="cx-row"><span class="cx-r-date">'+fData(r.data)+'</span><span class="cx-r-saldo">'+hv(fBRL(r.saldo))+'</span><span class="'+mCls+'">'+hv(mS)+'</span><span class="'+rCls+'">'+hv(rS)+'</span><button class="cx-r-del" onclick="remover('+c.id+','+r.id+')">×</button></div>';
    });
    var vm=rev.length>5?(expandido[c.id]?'<button class="ver-mais" onclick="exp('+c.id+')">↑ ocultar anteriores</button>':'<button class="ver-mais" onclick="exp('+c.id+')">↓ mais '+(rev.length-5)+' registros</button>'):"";
    html+='<div class="cx-card au"><div class="cx-accent" style="background:'+cor+'"></div>'+
      '<div class="cx-body">'+
      '<div class="cx-top"><div>'+
        '<div class="cx-name-row"><div class="cx-pulse" style="background:'+cor+';box-shadow:0 0 7px '+cor+'55"></div><span class="cx-name">'+c.nome+'</span></div>'+
        '<span class="cx-cdi" style="background:'+cor+'18;color:'+cor+';border:0.5px solid '+cor+'30">'+c.pct+'% CDI</span>'+
      '</div><div class="cx-right"><div class="cx-saldo-lbl">Saldo</div><div class="cx-saldo-val" style="color:'+cor+'">'+hv(saldo)+'</div></div></div>'+
      '<div class="cx-mets"><div class="cx-met"><div class="cx-met-lbl">Este mês</div><div class="cx-met-val" style="color:'+mCor+'">'+hv(mStr)+'</div></div>'+
      '<div class="cx-met"><div class="cx-met-lbl">Total</div><div class="cx-met-val" style="color:'+tCor+'">'+hv(tStr)+'</div></div></div>'+
      (regs.length===0?'<div class="cx-empty">Nenhum registro ainda</div>':
        '<div class="cx-tbl-s"><div class="cx-tbl-hd"><span>Data</span><span>Saldo</span><span>Movim.</span><span>Rendeu</span><span></span></div>'+rows+'</div>'+vm)+
      '</div>'+
      '<div class="cx-footer">'+
        '<button class="cx-btn-e" onclick="abrirConfig('+c.id+')">✎ Editar</button>'+
        /* FIX: onclick correto passando o id */
        '<button class="cx-btn-r" onclick="abrirSaldoDireto('+c.id+')">+ Registrar saldo</button>'+
      '</div></div>';
  });
  document.getElementById("cx-cards").innerHTML=html;
}

/* ── Confirmar ── */
function confirmar(){
  if(!modalState)return;
  if(modalState.tipo==="saldo"){
    var modo=modalState.modo||"completo";
    var data=(document.getElementById("i-data")||{}).value||hoje();
    var entrada=parseFloat((document.getElementById("i-ent")||{}).value)||0;
    var saida=parseFloat((document.getElementById("i-sai")||{}).value)||0;

    if(modo==="rendimento"){
      var rendVal=parseFloat((document.getElementById("i-rend")||{}).value);
      if(!rendVal){var e2=document.getElementById("i-rend");if(e2)e2.focus();return;}
      /* Calcular novo saldo = último saldo + rendimento */
      cx=cx.map(function(c){
        if(c.id!==modalState.id)return c;
        var ult=c.registros[c.registros.length-1];
        var novoSaldo=(ult?ult.saldo:0)+rendVal;
        var n=c.registros.concat([{id:Date.now(),data:data,saldo:parseFloat(novoSaldo.toFixed(2)),entrada:0,saida:0}]);
        n.sort(function(a,b){return a.data.localeCompare(b.data);});
        return Object.assign({},c,{registros:n});
      });
    } else {
      var se=document.getElementById("i-saldo");
      var saldo=parseFloat(se?se.value:"");
      if(!saldo||saldo<=0){if(se)se.focus();return;}
      cx=cx.map(function(c){
        if(c.id!==modalState.id)return c;
        var n=c.registros.concat([{id:Date.now(),data:data,saldo:saldo,entrada:entrada,saida:saida}]);
        n.sort(function(a,b){return a.data.localeCompare(b.data);});
        return Object.assign({},c,{registros:n});
      });
    }
  } else if(modalState.tipo==="config"){
    var nome=(document.getElementById("i-nome").value||"").trim();
    var pct=parseFloat(document.getElementById("i-pct").value)||0;
    cx=cx.map(function(c){return c.id===modalState.id?Object.assign({},c,{nome:nome||c.nome,pct:pct||c.pct,cor:corTemp||getHex(c)}):c;});
  } else if(modalState.tipo==="nova"){
    var nome2=(document.getElementById("i-nome").value||"").trim();
    var pct2=parseFloat(document.getElementById("i-pct").value)||0;
    if(!nome2||!pct2)return;
    var nid=Math.max.apply(null,cx.map(function(c){return c.id;}))+1;
    cx.push({id:nid,nome:nome2,pct:pct2,cor:corTemp||PALETTE[0],registros:[],ativo:true});
  }
  save();closeModal();render();toast("✓ Salvo");
}

function swatches(ca){
  return PALETTE.map(function(cor){
    return '<div class="sw'+(cor===ca?" on":"")+'" style="background:'+cor+'" onclick="selecionarCor(\''+cor+'\',event)"></div>';
  }).join("");
}
function selecionarCor(cor,ev){
  corTemp=cor;
  document.querySelectorAll(".sw").forEach(function(el){el.classList.remove("on");});
  if(ev&&ev.target)ev.target.classList.add("on");
}

function abrirConfig(id){
  var c=cx.find(function(x){return x.id===id;});
  corTemp=getHex(c);
  modalState={tipo:"config",id:id};
  document.getElementById("s-title").textContent="Editar caixinha";
  document.getElementById("s-sub").textContent="";
  document.getElementById("s-btns").style.display="flex";
  document.getElementById("s-confirm").textContent="Salvar";
  document.getElementById("s-confirm").className="btn-ok btn-purple";
  document.getElementById("s-body").innerHTML=
    '<div class="field"><label>Nome</label><input type="text" id="i-nome" value="'+c.nome+'"/></div>'+
    '<div class="field"><label>% do CDI</label><input type="number" inputmode="decimal" id="i-pct" value="'+c.pct+'"/></div>'+
    '<div class="field"><label>Cor — '+PALETTE.length+' opções</label><div class="palette">'+swatches(corTemp)+'</div></div>';
  setTimeout(function(){var e=document.getElementById("i-nome");if(e)e.focus();},100);
  openOverlay();
}

function abrirNovaCaixinha(){
  corTemp=PALETTE[0];modalState={tipo:"nova"};
  document.getElementById("s-title").textContent="Nova caixinha";
  document.getElementById("s-sub").textContent="";
  document.getElementById("s-btns").style.display="flex";
  document.getElementById("s-confirm").textContent="Criar";
  document.getElementById("s-confirm").className="btn-ok btn-green";
  document.getElementById("s-body").innerHTML=
    '<div class="field"><label>Nome</label><input type="text" id="i-nome" placeholder="ex: Nubank Turbo"/></div>'+
    '<div class="field"><label>% do CDI</label><input type="number" inputmode="decimal" id="i-pct" placeholder="ex: 121"/></div>'+
    '<div class="field"><label>Cor — '+PALETTE.length+' opções</label><div class="palette">'+swatches(corTemp)+'</div></div>';
  setTimeout(function(){var e=document.getElementById("i-nome");if(e)e.focus();},100);
  openOverlay();
}

function excluir(id){
  var c=cx.find(function(x){return x.id===id;});
  if(!confirm('Excluir "'+c.nome+'"?\nOs dados ficam no gráfico como inativa.'))return;
  cx=cx.map(function(x){return x.id===id?Object.assign({},x,{ativo:false}):x;});
  save();render();renderDados();
}
function reativar(id){
  cx=cx.map(function(x){return x.id===id?Object.assign({},x,{ativo:true}):x;});
  save();render();renderDados();toast("✓ Reativada!");
}
function remover(cid,rid){
  if(!confirm("Remover este registro?"))return;
  cx=cx.map(function(c){return c.id===cid?Object.assign({},c,{registros:c.registros.filter(function(r){return r.id!==rid;})}):c;});
  save();render();
}
function exportarBackup(){
  var b=new Blob([JSON.stringify(cx,null,2)],{type:"application/json"});
  var u=URL.createObjectURL(b);var a=document.createElement("a");
  a.href=u;a.download="caixinha-backup-"+new Date().toISOString().split("T")[0]+".json";
  a.click();URL.revokeObjectURL(u);toast("📤 Backup exportado!");
}
function importarBackup(ev){
  var f=ev.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    try{
      var d=JSON.parse(e.target.result);
      if(!Array.isArray(d))throw new Error();
      if(confirm("Substituir dados atuais?\n"+d.length+" caixinhas encontradas.")){
        cx=d;save();render();toast("✓ Backup restaurado!");
      }
    }catch(err){alert("Arquivo inválido.");}
  };
  r.readAsText(f);ev.target.value="";
}

document.addEventListener("keydown",function(e){
  if(e.key==="Enter"&&modalState&&modalState.tipo!=="lista"&&modalState.tipo!=="modos")confirmar();
  if(e.key==="Escape")closeModal();
});

window.onerror=function(msg,src,line,col,err){
  var d=document.createElement("div");
  d.style.cssText="position:fixed;top:60px;left:16px;right:16px;background:#1a0808;border:1px solid #ff3b55;border-radius:12px;padding:12px;font-size:11px;color:#ff3b55;z-index:9999;word-break:break-all;";
  d.textContent="Erro: "+(err?err.message:msg);
  document.body.appendChild(d);setTimeout(function(){d.remove();},8000);
  return false;
};

function render(){
  try{
    renderHero();
    var ms=getMeses();
    if(!mesSel&&ms.length)mesSel=ms[0];
    renderMonthPills();
    renderChart();
    renderMonthSummary();
    renderCards();
  }catch(e){console.error("render:",e);window.onerror(e.message,"",0,0,e);}
}

if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",render);}
else{setTimeout(render,0);}
</script>
</body>
</html>
