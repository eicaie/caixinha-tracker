<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Caixinha"/>
<title>Caixinha</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#060B14;
  --bg2:#0D1828;
  --bg3:#121F35;
  --bg4:#172640;
  --glass:rgba(255,255,255,0.042);
  --glass2:rgba(255,255,255,0.07);
  --glass3:rgba(255,255,255,0.11);
  --border:rgba(255,255,255,0.065);
  --border2:rgba(255,255,255,0.11);
  --border3:rgba(255,255,255,0.18);
  --text:#F0F5FF;
  --text2:#8BA3CC;
  --text3:#3A5070;
  --green:#00D68F;
  --red:#FF3B55;
  --orange:#FF9F0A;
  --purple:#BF5AF2;
  --blue:#0A84FF;
  --tab-h:80px;
  --safe-top:env(safe-area-inset-top, 44px);
  --safe-bot:env(safe-area-inset-bottom, 20px);
}
html{scroll-behavior:smooth;height:100%;}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100%;overflow-x:hidden;
  padding-bottom:calc(var(--tab-h) + var(--safe-bot) + 16px);
}

/* ── Ambient background orbs ── */
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);}
.orb1{width:320px;height:320px;top:-80px;right:-80px;background:radial-gradient(circle,rgba(10,132,255,0.12) 0%,transparent 70%);}
.orb2{width:260px;height:260px;bottom:160px;left:-100px;background:radial-gradient(circle,rgba(0,214,143,0.09) 0%,transparent 70%);}
.orb3{width:200px;height:200px;top:40%;right:-60px;background:radial-gradient(circle,rgba(191,90,242,0.07) 0%,transparent 70%);}

/* ── Content layer ── */
.content{position:relative;z-index:1;}

/* ── Status bar spacer ── */
.status-bar{height:calc(var(--safe-top) + 8px);min-height:52px;}

/* ── Page header ── */
.page-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px 18px;
}
.page-title{font-size:28px;font-weight:800;letter-spacing:-0.035em;color:var(--text);}
.header-actions{display:flex;gap:8px;align-items:center;}
.icon-btn{
  width:36px;height:36px;border-radius:50%;
  background:var(--glass2);border:0.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;
  transition:transform 0.12s,background 0.12s;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.icon-btn:active{transform:scale(0.88);background:var(--glass3);}

/* ── Hero card ── */
.hero-card{
  margin:0 16px 16px;
  background:linear-gradient(145deg,rgba(10,132,255,0.12) 0%,rgba(0,214,143,0.07) 60%,rgba(191,90,242,0.05) 100%);
  border:0.5px solid var(--border2);border-radius:28px;
  padding:24px 22px 20px;
  position:relative;overflow:hidden;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.hero-card::before{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(135deg,rgba(255,255,255,0.06) 0%,transparent 50%);
  pointer-events:none;
}
.hero-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2) 30%,rgba(255,255,255,0.12) 70%,transparent);
}
.hero-label{font-size:11px;font-weight:600;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase;margin-bottom:10px;}
.hero-amount{font-size:48px;font-weight:800;letter-spacing:-0.04em;line-height:1;color:var(--text);margin-bottom:16px;}
.hero-amount .currency{font-size:22px;font-weight:600;opacity:0.7;vertical-align:top;margin-top:6px;display:inline-block;}
.hero-stats{display:flex;gap:8px;flex-wrap:wrap;}
.hstat{
  display:flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:20px;
  font-size:12px;font-weight:600;
  background:rgba(0,0,0,0.25);
  border:0.5px solid var(--border2);
}
.hstat-green{color:var(--green);}
.hstat-purple{color:var(--purple);}
.hstat-blue{color:var(--blue);}
.hstat svg{opacity:0.8;}

/* ── Section header ── */
.sec-hd{display:flex;align-items:center;padding:0 20px;margin-bottom:10px;}
.sec-title{font-size:13px;font-weight:700;letter-spacing:0.06em;color:var(--text3);text-transform:uppercase;}

/* ── Glass card ── */
.glass-card{
  margin:0 16px 12px;
  background:var(--glass);border:0.5px solid var(--border);
  border-radius:22px;padding:18px 16px;
  position:relative;overflow:hidden;
}
.glass-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:0.5px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1) 40%,rgba(255,255,255,0.06) 70%,transparent);
  pointer-events:none;
}

/* ── Chart ── */
.chart-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.chart-kv-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;}
.chart-kv-val{font-size:24px;font-weight:800;letter-spacing:-0.03em;}
.chart-kv-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.chart-wrap{height:120px;position:relative;}
.chart-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.cl-item{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--text2);}
.cl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* ── Month pills ── */
.mpill-scroll{display:flex;gap:6px;padding:0 16px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.mpill-scroll::-webkit-scrollbar{display:none;}
.mpill{
  padding:8px 16px;border-radius:20px;white-space:nowrap;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;
  background:var(--glass);border:0.5px solid var(--border);color:var(--text3);
  transition:all 0.15s;
}
.mpill.active{background:rgba(10,132,255,0.14);color:var(--blue);border-color:rgba(10,132,255,0.28);}

/* ── Month summary ── */
.ms-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.ms-title{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:3px;}
.ms-total{font-size:22px;font-weight:800;letter-spacing:-0.025em;}
.ms-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.ms-badge{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;}
.ms-rows{display:flex;flex-direction:column;gap:6px;}
.ms-row{
  display:flex;align-items:center;gap:10px;
  background:rgba(0,0,0,0.2);border-radius:14px;
  padding:11px 13px;border:0.5px solid rgba(255,255,255,0.028);
}
.ms-row-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ms-row-info{flex:1;min-width:0;}
.ms-row-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ms-row-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.ms-bar-wrap{height:3px;border-radius:2px;background:rgba(255,255,255,0.05);margin-top:8px;}
.ms-bar-fill{height:100%;border-radius:2px;transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1);}
.ms-row-rend{font-size:13px;font-weight:700;text-align:right;flex-shrink:0;}

/* ── Divider ── */
.divider{height:0.5px;background:var(--border);margin:4px 20px 20px;}

/* ── Caixinha card ── */
.cx-card{
  margin:0 16px 10px;
  border-radius:22px;padding:0;
  position:relative;overflow:hidden;
  border:0.5px solid var(--border);
  background:var(--glass);
}
.cx-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:0.5px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.09) 40%,rgba(255,255,255,0.05) 70%,transparent);
  pointer-events:none;
}
.cx-card-accent{position:absolute;top:0;left:0;bottom:0;width:3px;border-radius:22px 0 0 22px;}
.cx-card-body{padding:18px 16px 14px 20px;}
.cx-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:13px;}
.cx-name-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.cx-pulse{width:7px;height:7px;border-radius:50%;animation:pulse 2.5s ease-in-out infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(0.85)}}
.cx-name{font-size:15px;font-weight:700;}
.cx-cdi{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.cx-right{text-align:right;padding-left:10px;flex-shrink:0;}
.cx-saldo-lbl{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:3px;}
.cx-saldo-val{font-size:22px;font-weight:800;letter-spacing:-0.025em;}
.cx-metrics{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}
.cx-met{background:rgba(0,0,0,0.22);border-radius:13px;padding:10px 12px;border:0.5px solid rgba(255,255,255,0.028);}
.cx-met-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:4px;}
.cx-met-val{font-size:14px;font-weight:700;}

/* table */
.cx-tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:2px;}
.cx-tbl-head{display:grid;grid-template-columns:68px 1fr 70px 1fr 24px;gap:4px;padding:0 8px 6px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;min-width:300px;}
.cx-row{display:grid;grid-template-columns:68px 1fr 70px 1fr 24px;gap:4px;align-items:center;padding:10px 8px;background:rgba(0,0,0,0.18);border-radius:11px;margin-bottom:4px;min-width:300px;border:0.5px solid rgba(255,255,255,0.02);}
.cx-r-date{font-size:11px;color:var(--text3);}
.cx-r-saldo{font-size:12px;font-weight:600;color:var(--text);}
.cx-r-ent{font-size:11px;color:var(--green);}
.cx-r-sai{font-size:11px;color:var(--orange);}
.cx-r-none{font-size:11px;color:var(--text3);}
.cx-r-pos{font-size:11px;font-weight:600;color:var(--green);}
.cx-r-neg{font-size:11px;font-weight:600;color:var(--red);}
.cx-r-del{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0;width:24px;text-align:center;line-height:1;}
.cx-r-del:active{color:var(--red);}
.cx-empty{text-align:center;font-size:12px;color:var(--text3);padding:18px 0;}
.ver-mais{width:100%;background:none;border:0.5px solid var(--border);border-radius:10px;padding:8px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;margin:6px 0;}

.cx-footer{display:flex;gap:6px;padding:10px 14px 14px;border-top:0.5px solid var(--border);}
.cx-btn-edit{flex:1;background:var(--glass);border:0.5px solid var(--border2);border-radius:12px;padding:10px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;text-align:center;}
.cx-btn-reg{flex:2;border:none;border-radius:12px;padding:10px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:rgba(10,132,255,0.14);color:var(--blue);border:0.5px solid rgba(10,132,255,0.26);}

/* ── Tab Bar ── */
.tab-bar{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--tab-h) + var(--safe-bot));
  background:rgba(8,14,26,0.82);
  border-top:0.5px solid var(--border2);
  backdrop-filter:saturate(180%) blur(28px);
  -webkit-backdrop-filter:saturate(180%) blur(28px);
  z-index:200;
  display:flex;align-items:flex-start;justify-content:space-around;
  padding-top:10px;
}
.tab-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;width:72px;padding:2px 0;
  transition:opacity 0.15s;
}
.tab-item:active{opacity:0.5;}
.tab-icon{font-size:22px;line-height:1;}
.tab-label{font-size:10px;font-weight:600;letter-spacing:0.02em;}
.tab-item.active .tab-icon,.tab-item.active .tab-label{color:var(--blue);}
.tab-item:not(.active) .tab-icon,.tab-item:not(.active) .tab-label{color:var(--text3);}
.tab-center-btn{
  width:52px;height:52px;border-radius:50%;
  background:var(--blue);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(10,132,255,0.38);
  font-size:24px;color:#fff;cursor:pointer;
  transform:translateY(-6px);
  transition:transform 0.12s,box-shadow 0.12s;
}
.tab-center-btn:active{transform:translateY(-4px) scale(0.92);box-shadow:0 2px 10px rgba(10,132,255,0.25);}

/* ── Toast ── */
.toast{
  position:fixed;bottom:calc(var(--tab-h) + var(--safe-bot) + 12px);left:50%;
  transform:translateX(-50%) translateY(8px);
  background:rgba(8,14,26,0.96);border:0.5px solid var(--border3);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  color:var(--green);border-radius:30px;
  padding:11px 22px;font-size:13px;font-weight:600;
  opacity:0;transition:opacity 0.2s,transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
  z-index:500;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── Overlay / Bottom Sheet ── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(2,6,16,0.72);
  z-index:300;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.overlay.open{display:flex;}
.sheet{
  background:var(--bg2);
  border:0.5px solid var(--border2);
  border-radius:28px 28px 0 0;
  padding:16px 20px 24px;width:100%;max-width:700px;
  animation:slideUp 0.25s cubic-bezier(0.32,0.72,0,1);
  max-height:92vh;overflow-y:auto;
  padding-bottom:calc(24px + var(--safe-bot));
}
@media(min-height:700px){
  .overlay{align-items:center;}
  .sheet{border-radius:28px;max-width:440px;padding-bottom:24px;}
}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:36px;height:5px;border-radius:3px;background:rgba(255,255,255,0.1);margin:0 auto 20px;}
.sheet-title{font-size:20px;font-weight:800;letter-spacing:-0.025em;margin-bottom:4px;}
.sheet-sub{font-size:12px;color:var(--text3);margin-bottom:22px;}
.field{margin-bottom:14px;}
.field label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:0.1em;display:block;margin-bottom:7px;text-transform:uppercase;}
.field input{background:var(--bg3);border:0.5px solid var(--border2);border-radius:14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;padding:14px;width:100%;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:var(--blue);}
.field-hint{font-size:10px;color:var(--text3);margin-top:4px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.field-row label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:0.1em;display:block;margin-bottom:7px;text-transform:uppercase;}
.field-row input{background:var(--bg3);border:0.5px solid var(--border2);border-radius:14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;padding:14px;width:100%;outline:none;transition:border-color 0.2s;}
.field-row input:focus{border-color:var(--blue);}
.mdivider{border:none;border-top:0.5px solid var(--border);margin:14px 0;}
.m-sec-label{font-size:11px;color:var(--text3);margin-bottom:10px;letter-spacing:0.04em;}
.sheet-btns{display:flex;gap:8px;margin-top:20px;}
.btn-cancel{flex:1;background:var(--bg3);color:var(--text2);border:0.5px solid var(--border);border-radius:14px;padding:15px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
.btn-confirm{flex:2;border:none;border-radius:14px;padding:15px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-green{background:var(--green);color:#000;}
.btn-purple{background:var(--purple);color:#fff;}
.back-btn{background:none;border:none;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:14px;padding:0;}

/* cx list in modal */
.cx-list{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;}
.cx-list-item{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;background:var(--bg3);border-radius:14px;cursor:pointer;border:0.5px solid var(--border2);}
.cx-list-left{display:flex;align-items:center;gap:9px;}
.cx-list-name{font-size:14px;font-weight:600;}
.cx-list-actions{display:flex;gap:5px;}
.cla-btn{border:none;border-radius:8px;padding:5px 9px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;}
.cla-del{background:rgba(255,59,85,0.1);color:var(--red);}
.cla-edit{background:var(--bg4);color:var(--text2);}
.new-cx-btn{width:100%;background:none;border:0.5px dashed var(--border2);border-radius:14px;padding:13px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;margin-top:4px;}

/* color swatches */
.color-picker-row{display:flex;flex-wrap:wrap;gap:8px;}
.color-swatch{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.15s,border-color 0.15s;}
.color-swatch.selected{border-color:#fff;transform:scale(1.15);}

/* hidden value */
.hval{color:var(--text3);letter-spacing:0.18em;font-size:0.8em;}

/* ── Data section ── */
.data-section{padding:0 16px 0;}
.data-card{
  background:var(--glass);border:0.5px solid var(--border);
  border-radius:18px;overflow:hidden;margin-bottom:10px;
}
.data-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:15px 16px;border-bottom:0.5px solid var(--border);
  cursor:pointer;
}
.data-row:last-child{border-bottom:none;}
.data-row:active{background:rgba(255,255,255,0.03);}
.data-row-left{display:flex;align-items:center;gap:12px;}
.data-row-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:17px;
}
.data-row-icon.green{background:rgba(0,214,143,0.12);}
.data-row-icon.purple{background:rgba(191,90,242,0.12);}
.data-row-icon.blue{background:rgba(10,132,255,0.12);}
.data-row-icon.orange{background:rgba(255,159,10,0.12);}
.data-row-title{font-size:15px;font-weight:600;color:var(--text);}
.data-row-sub{font-size:12px;color:var(--text3);margin-top:1px;}
.data-row-chevron{color:var(--text3);font-size:18px;}

/* page sections */
.page-section{display:none;}
.page-section.visible{display:block;}

/* ── Animação de entrada ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.anim-in{animation:fadeUp 0.35s ease both;}
.anim-in:nth-child(2){animation-delay:0.05s;}
.anim-in:nth-child(3){animation-delay:0.1s;}
.anim-in:nth-child(4){animation-delay:0.15s;}
.anim-in:nth-child(5){animation-delay:0.2s;}
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="content">
  <div class="status-bar"></div>

  <!-- ════ VISÃO GERAL ════ -->

function carregarDados(){
  try{
    var r=localStorage.getItem(STORAGE_KEY);
    if(r){var d=JSON.parse(r);if(d&&Array.isArray(d)&&d.length>0)return d;}
  }catch(e){}
  // Merge backup: preserve stored data if exists, else use DADOS_BACKUP with new data
  localStorage.setItem(STORAGE_KEY,JSON.stringify(DADOS_BACKUP));
  return JSON.parse(JSON.stringify(DADOS_BACKUP));
}
function salvarDados(){localStorage.setItem(STORAGE_KEY,JSON.stringify(caixinhas));}
var caixinhas=carregarDados();

function getHex(c){return c.cor||PALETTE[c.id%PALETTE.length]||"#0A84FF";}
function fBRL(v){return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});}
function fData(d){return new Date(d+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit"});}
function hoje(){return new Date().toISOString().split("T")[0];}
function showToast(m,cor){
  var t=document.getElementById("toast");
  t.textContent=m;
  t.style.color=cor||"var(--green)";
  t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},2400);
}
function toggleOcultar(){
  oculto=!oculto;
  document.getElementById("eye-btn").textContent=oculto?"🙈":"👁";
  render();
}
function hv(v){return oculto?'<span class="hval">••••</span>':v;}

function calcRendimentos(regs){
  return regs.map(function(r,i){
    if(i===0)return Object.assign({},r,{rendimento:null});
    var a=regs[i-1];
    return Object.assign({},r,{rendimento:r.saldo-a.saldo-(r.entrada||0)+(r.saida||0)});
  });
}
function totalRendimento(regs){
  if(!regs||regs.length<2)return null;
  return calcRendimentos(regs).filter(function(r){return r.rendimento!==null;}).reduce(function(a,r){return a+r.rendimento;},0);
}
function rendimentoParaMes(regs,ano,mes){
  var rs=calcRendimentos(regs).filter(function(r){
    if(r.rendimento===null)return false;
    var d=new Date(r.data+"T12:00:00");
    return d.getFullYear()===ano&&d.getMonth()===mes;
  });
  if(!rs.length)return null;
  return rs.reduce(function(a,r){return a+r.rendimento;},0);
}
function rendimentoMes(regs){var n=new Date();return rendimentoParaMes(regs,n.getFullYear(),n.getMonth());}

function getMesesDisponiveis(){
  var set={};
  caixinhas.filter(function(c){return c.ativo!==false;}).forEach(function(c){
    c.registros.forEach(function(r){
      var d=new Date(r.data+"T12:00:00");
      set[d.getFullYear()+"-"+d.getMonth()]=true;
    });
  });
  var arr=Object.keys(set).map(function(k){var p=k.split("-");return{ano:parseInt(p[0]),mes:parseInt(p[1])};});
  arr.sort(function(a,b){return b.ano-a.ano||b.mes-a.mes;});
  return arr;
}

  document.querySelectorAll(".tab-item").forEach(function(el){el.classList.remove("active");});
  document.getElementById("page-"+page).classList.add("visible");
  document.getElementById("tab-"+page).classList.add("active");
  if(page==="data")updateDataPage();
  window.scrollTo(0,0);
}

function updateDataPage(){
  var ativas=caixinhas.filter(function(c){return c.ativo!==false;});
  document.getElementById("data-stats-sub").textContent=ativas.length+" caixinhas · "+ativas.reduce(function(a,c){return a+c.registros.length;},0)+" registros";
}

// ── Hero ──
function renderHero(){
  var ativas=caixinhas.filter(function(c){return c.ativo!==false;});
  var totalPat=ativas.reduce(function(acc,c){var u=c.registros[c.registros.length-1];return acc+(u?u.saldo:0);},0);
  var totalMes=ativas.reduce(function(acc,c){return acc+(rendimentoMes(c.registros)||0);},0);
  var totalAcum=ativas.reduce(function(acc,c){return acc+(totalRendimento(c.registros)||0);},0);

  if(oculto){
    document.getElementById("hero-val").innerHTML='<span class="hval" style="font-size:32px;letter-spacing:0.2em">••••••</span>';
  } else {
    var formatted=fBRL(totalPat).replace("R$","").trim();
    document.getElementById("hero-val").innerHTML='<span class="currency">R$ </span>'+formatted;
  }

  var stats="";
  if(totalMes!==0){
    var mesCor=totalMes>=0?"hstat-green":"hstat-red";
    stats+='<div class="hstat '+mesCor+'">'+(totalMes>=0?"↑":"↓")+" "+(oculto?"••••":fBRL(Math.abs(totalMes)))+' mês</div>';
  }
  stats+='<div class="hstat hstat-purple">★ '+(oculto?"••••":fBRL(totalAcum))+' total</div>';
  stats+='<div class="hstat hstat-blue">◉ '+ativas.length+' ativas</div>';
  document.getElementById("hero-stats").innerHTML=stats;
}

// ── Chart ──
function renderDailyChart(){
  var now=new Date();
  var ano=now.getFullYear(),mes=now.getMonth();
  var diasNoMes=new Date(ano,mes+1,0).getDate();
  var ativas=caixinhas.filter(function(c){return c.ativo!==false;});
  var datasets=ativas.map(function(c){
    var regs=calcRendimentos(c.registros).filter(function(r){
      if(r.rendimento===null)return false;
      var d=new Date(r.data+"T12:00:00");
      return d.getFullYear()===ano&&d.getMonth()===mes;
    });
    var acum=[],run=0;
    for(var i=0;i<diasNoMes;i++){
      var dia=i+1;
      regs.forEach(function(r){var rd=new Date(r.data+"T12:00:00").getDate();if(rd===dia)run+=r.rendimento;});
      acum.push(parseFloat(Math.max(0,run).toFixed(4)));
    }
    return{label:c.nome,data:acum,cor:getHex(c)};
  });
  var diaIdx=now.getDate()-1;
  var totalHoje=datasets.reduce(function(acc,ds){return acc+(ds.data[diaIdx]||0);},0);
  document.getElementById("daily-val").innerHTML=oculto?'<span class="hval">••••</span>':fBRL(parseFloat(totalHoje.toFixed(2)));
  document.getElementById("daily-sub").textContent=NOMES_MES[mes]+" "+ano+" · dia "+now.getDate();

    type:"bar",
    data:{

// ── Month pills ──
function renderMonthPills(){
  var meses=getMesesDisponiveis();
  if(!meses.length){document.getElementById("month-pills").innerHTML="";return;}
  if(!mesSelecionado)mesSelecionado=meses[0];
  document.getElementById("month-pills").innerHTML=meses.map(function(m){
    var active=mesSelecionado&&mesSelecionado.ano===m.ano&&mesSelecionado.mes===m.mes?" active":"";
    return '<div class="mpill'+active+'" onclick="selecionarMes('+m.ano+','+m.mes+')">'+NOMES_MES[m.mes]+" "+m.ano+"</div>";
  }).join("");
}
function selecionarMes(ano,mes){mesSelecionado={ano:ano,mes:mes};renderMonthPills();renderMonthSummary();}

// ── Month summary ──
function renderMonthSummary(){
  if(!mesSelecionado){document.getElementById("month-summary-card").innerHTML='<div style="text-align:center;color:var(--text3);padding:24px;font-size:12px">Nenhum dado disponível</div>';return;}
  var ano=mesSelecionado.ano,mes=mesSelecionado.mes;
  var ativas=caixinhas.filter(function(c){return c.ativo!==false;});
  var totalRend=0,totalDep=0,totalRet=0,maxRend=0;
  var rows=ativas.map(function(c){
    var rend=rendimentoParaMes(c.registros,ano,mes)||0;
    var regsDoMes=c.registros.filter(function(r){var d=new Date(r.data+"T12:00:00");return d.getFullYear()===ano&&d.getMonth()===mes;});
    var dep=regsDoMes.reduce(function(a,r){return a+(r.entrada||0);},0);
    var ret=regsDoMes.reduce(function(a,r){return a+(r.saida||0);},0);
    var ultReg=regsDoMes.length?regsDoMes[regsDoMes.length-1]:null;
    totalRend+=rend;totalDep+=dep;totalRet+=ret;
    if(Math.abs(rend)>maxRend)maxRend=Math.abs(rend);
    return{c:c,rend:rend,dep:dep,ret:ret,saldo:ultReg?ultReg.saldo:null};
  }).filter(function(r){return r.saldo!==null||r.rend!==0;});

  var rendCor=totalRend>=0?"var(--green)":"var(--red)";
  var rendStr=(totalRend>=0?"+":"")+fBRL(parseFloat(totalRend.toFixed(2)));
  var badgeStyle=totalRend>=0?"background:rgba(0,214,143,0.1);color:var(--green);border:0.5px solid rgba(0,214,143,0.2)":"background:rgba(255,59,85,0.1);color:var(--red);border:0.5px solid rgba(255,59,85,0.2)";
  var html='<div class="ms-head">'+
    '<div>'+
      '<div class="ms-title">Rendimento total</div>'+
      '<div class="ms-total" style="color:'+rendCor+'">'+hv(rendStr)+'</div>'+
      '<div class="ms-sub">'+NOMES_MES[mes]+" "+ano+(totalDep>0?" · dep. "+fBRL(parseFloat(totalDep.toFixed(2))):"")+(totalRet>0?" · ret. "+fBRL(parseFloat(totalRet.toFixed(2))):"")+'</div>'+
    '</div>'+
    '<div class="ms-badge" style="'+badgeStyle+'">'+(totalRend>=0?"▲ ":"▼ ")+(oculto?"••••":fBRL(Math.abs(parseFloat(totalRend.toFixed(2)))))+'</div>'+
  '</div><div class="ms-rows">';
  rows.forEach(function(row){
    var cor=getHex(row.c);
    var rs=(row.rend>=0?"+":"")+fBRL(parseFloat(row.rend.toFixed(2)));
    var rc=row.rend>=0?"var(--green)":"var(--red)";
    var pct=maxRend>0?Math.round(Math.abs(row.rend)/maxRend*100):0;
    var depStr=row.dep>0?"<span style='color:var(--green)'>+"+fBRL(parseFloat(row.dep.toFixed(2)))+" dep</span>":"";
    var retStr=row.ret>0?"<span style='color:var(--orange)'>-"+fBRL(parseFloat(row.ret.toFixed(2)))+" ret</span>":"";
    var movStr=[depStr,retStr].filter(Boolean).join(" · ");
    html+='<div class="ms-row">'+
      '<div class="ms-row-dot" style="background:'+cor+'"></div>'+
      '<div class="ms-row-info">'+
        '<div class="ms-row-name">'+row.c.nome+'</div>'+
        '<div class="ms-row-sub">'+(row.saldo!==null?hv("saldo "+fBRL(row.saldo)):"")+(movStr?" · "+movStr:"")+'</div>'+
        '<div class="ms-bar-wrap"><div class="ms-bar-fill" style="width:'+pct+'%;background:'+cor+'"></div></div>'+
      '</div>'+
      '<div class="ms-row-rend" style="color:'+rc+'">'+hv(rs)+'</div>'+
    '</div>';
  });
  html+='</div>';
  document.getElementById("month-summary-card").innerHTML=html;
}

// ── Caixinha cards ──
function renderCards(){
  var ativas=caixinhas.filter(function(c){return c.ativo!==false;});
  var html="";
  ativas.forEach(function(c){
    var cor=getHex(c);
    var regs=calcRendimentos(c.registros);
    var totalRend=totalRendimento(c.registros);
    var rendMes=rendimentoMes(c.registros);
    var ultimo=c.registros[c.registros.length-1];
    var saldoAtual=ultimo?fBRL(ultimo.saldo):"—";
    var rendMesStr=rendMes!==null?(rendMes>=0?"+":"")+fBRL(parseFloat(rendMes.toFixed(2))):"—";
    var rendMesCor=rendMes===null?"var(--text3)":(rendMes>=0?"var(--green)":"var(--red)");
    var rendTotalStr=totalRend!==null?(totalRend>=0?"+":"")+fBRL(parseFloat(totalRend.toFixed(2))):"—";
    var rendTotalCor=totalRend===null?"var(--text3)":(totalRend>=0?"var(--green)":"var(--red)");
    var revsRegs=regs.slice().reverse();
    var visiveis=expandido[c.id]?revsRegs:revsRegs.slice(0,5);
    var rowsHtml="";
    visiveis.forEach(function(reg){
      var ent=reg.entrada||0,sai=reg.saida||0;
      var movCls="cx-r-none",movStr="—";
      if(ent>0){movCls="cx-r-ent";movStr="+"+fBRL(ent);}
      else if(sai>0){movCls="cx-r-sai";movStr="-"+fBRL(sai);}
      var rendCls="cx-r-none",rendStr="—";
      if(reg.rendimento!==null){rendCls=reg.rendimento>=0?"cx-r-pos":"cx-r-neg";rendStr=(reg.rendimento>=0?"+":"")+fBRL(parseFloat(reg.rendimento.toFixed(2)));}
      rowsHtml+='<div class="cx-row">'+
        '<span class="cx-r-date">'+fData(reg.data)+'</span>'+
        '<span class="cx-r-saldo">'+hv(fBRL(reg.saldo))+'</span>'+
        '<span class="'+movCls+'">'+hv(movStr)+'</span>'+
        '<span class="'+rendCls+'">'+hv(rendStr)+'</span>'+
        '<button class="cx-r-del" onclick="remover('+c.id+','+reg.id+')">×</button>'+
      '</div>';
    });
    var verMais=revsRegs.length>5?(expandido[c.id]?
      '<button class="ver-mais" onclick="toggleExp('+c.id+')">↑ ocultar anteriores</button>':
      '<button class="ver-mais" onclick="toggleExp('+c.id+')">↓ mais '+(revsRegs.length-5)+' registros</button>'):"";
    html+='<div class="cx-card anim-in">'+
      '<div class="cx-card-accent" style="background:'+cor+'"></div>'+
      '<div class="cx-card-body">'+
        '<div class="cx-top">'+
          '<div>'+
            '<div class="cx-name-row"><div class="cx-pulse" style="background:'+cor+';box-shadow:0 0 7px '+cor+'66"></div><span class="cx-name">'+c.nome+'</span></div>'+
            '<span class="cx-cdi" style="background:'+cor+'18;color:'+cor+';border:0.5px solid '+cor+'30">'+c.pct+'% CDI</span>'+
          '</div>'+
          '<div class="cx-right">'+
            '<div class="cx-saldo-lbl">Saldo</div>'+
            '<div class="cx-saldo-val" style="color:'+cor+'">'+hv(saldoAtual)+'</div>'+
          '</div>'+
        '</div>'+
        '<div class="cx-metrics">'+
          '<div class="cx-met"><div class="cx-met-lbl">Este mês</div><div class="cx-met-val" style="color:'+rendMesCor+'">'+hv(rendMesStr)+'</div></div>'+
          '<div class="cx-met"><div class="cx-met-lbl">Total rendido</div><div class="cx-met-val" style="color:'+rendTotalCor+'">'+hv(rendTotalStr)+'</div></div>'+
        '</div>'+
        (regs.length===0?'<div class="cx-empty">Nenhum registro ainda</div>':
          '<div class="cx-tbl-scroll"><div class="cx-tbl-head"><span>Data</span><span>Saldo</span><span>Movim.</span><span>Rendeu</span><span></span></div><div>'+rowsHtml+'</div></div>'+verMais)+
      '</div>'+
      '<div class="cx-footer">'+
        '<button class="cx-btn-edit" onclick="abrirConfig('+c.id+')">✎ Editar</button>'+
        '<button class="cx-btn-reg" onclick="abrirSaldo('+c.id+')">+ Registrar saldo</button>'+
      '</div>'+
    '</div>';
  });
  document.getElementById("cx-cards").innerHTML=html||'<div style="text-align:center;color:var(--text3);padding:32px;font-size:13px">Nenhuma caixinha ativa</div>';
}
function toggleExp(id){expandido[id]=!expandido[id];renderCards();}

// ── Estatísticas ──
function mostrarEstatisticas(){
  var panel=document.getElementById("stats-panel");
  if(panel.style.display!=="none"){panel.style.display="none";return;}
  var ativas=caixinhas.filter(function(c){return c.ativo!==false;});
  var totalReg=ativas.reduce(function(a,c){return a+c.registros.length;},0);
  var totalPat=ativas.reduce(function(acc,c){var u=c.registros[c.registros.length-1];return acc+(u?u.saldo:0);},0);
  var totalAcum=ativas.reduce(function(acc,c){return acc+(totalRendimento(c.registros)||0);},0);
  var melhor=null;
  ativas.forEach(function(c){var r=totalRendimento(c.registros)||0;if(!melhor||r>melhor.r)melhor={nome:c.nome,r:r};});
  var html='<div style="font-size:13px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px">Resumo geral</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">'+
    statsKv("Patrimônio total",oculto?"••••":fBRL(totalPat),"var(--blue)")+
    statsKv("Rendimento total",oculto?"••••":fBRL(totalAcum),"var(--green)")+
    statsKv("Caixinhas ativas",ativas.length,"var(--text)")+
    statsKv("Total de registros",totalReg,"var(--text)")+
    (melhor?statsKv("Maior rendimento",melhor.nome,"var(--purple)"):"")+'</div>';
  panel.innerHTML=html;
  panel.style.display="block";
}
function statsKv(label,val,cor){
  return '<div style="background:rgba(0,0,0,0.2);border-radius:12px;padding:12px;border:0.5px solid rgba(255,255,255,0.03)">'+
    '<div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px">'+label+'</div>'+
    '<div style="font-size:14px;font-weight:700;color:'+cor+'">'+val+'</div></div>';
}

    '<div class="field-row">'+
      '<div><label>Depósito</label><input type="number" inputmode="decimal" id="input-entrada" placeholder="0,00"/><div class="field-hint">Valor colocado</div></div>'+

function swatchesHTML(ca){

function selecionarCor(cor,evt){

function abrirConfig(id){

  document.getElementById("modal-title").textContent="Configurar caixinha";

function abrirNovaCaixinha(){
  corTemp=PALETTE[0];modalState={tipo:"nova"};
  document.getElementById("modal-title").textContent="Nova caixinha";
  document.getElementById("modal-sub").textContent="";
  document.getElementById("modal-btns").style.display="flex";
  document.getElementById("confirm-btn").textContent="Criar";
  document.getElementById("confirm-btn").className="btn-confirm btn-green";

    '<button class="back-btn" onclick="abrirGerenciar()">← voltar</button>'+

    '<div class="field"><label>% do CDI</label><input type="number" inputmode="decimal" id="input-pct" placeholder="ex: 121"/></div>'+

  setTimeout(function(){var el=document.getElementById("input-nome");if(el)el.focus();},100);

function excluirCaixinha(id){
  var c=caixinhas.find(function(x){return x.id===id;});
  if(!confirm('Excluir "'+c.nome+'"?'))return;
  caixinhas=caixinhas.map(function(cx){return cx.id===id?Object.assign({},cx,{ativo:false}):cx;});
  salvarDados();renderGerenciarBody();render();
}
function closeModal(){
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("modal-btns").style.display="flex";
  modalState=null;corTemp=null;
}
function fecharModal(e){if(e.target===document.getElementById("overlay"))closeModal();}
function confirmar(){
  if(!modalState)return;
  if(modalState.tipo==="saldo"){
    var saldoEl=document.getElementById("input-saldo");
    var saldo=parseFloat(saldoEl?saldoEl.value:"");
    if(!saldo||saldo<=0){if(saldoEl)saldoEl.focus();return;}
    var data=document.getElementById("input-data").value||hoje();
    var entrada=parseFloat(document.getElementById("input-entrada").value)||0;
    var saida=parseFloat(document.getElementById("input-saida").value)||0;
    caixinhas=caixinhas.map(function(c){
      if(c.id!==modalState.id)return c;
      var novos=c.registros.concat([{id:Date.now(),data:data,saldo:saldo,entrada:entrada,saida:saida}]);
      novos.sort(function(a,b){return a.data.localeCompare(b.data);});
      return Object.assign({},c,{registros:novos});
    });
  } else if(modalState.tipo==="config"){
    var nome=(document.getElementById("input-nome").value||"").trim();
    var pct=parseFloat(document.getElementById("input-pct").value)||0;
    caixinhas=caixinhas.map(function(c){return c.id===modalState.id?Object.assign({},c,{nome:nome||c.nome,pct:pct||c.pct,cor:corTemp||getHex(c)}):c;});
  } else if(modalState.tipo==="nova"){
    var nome2=(document.getElementById("input-nome").value||"").trim();
    var pct2=parseFloat(document.getElementById("input-pct").value)||0;
    if(!nome2||!pct2)return;
    var newId=Math.max.apply(null,caixinhas.map(function(c){return c.id;}))+1;
    caixinhas.push({id:newId,nome:nome2,pct:pct2,cor:corTemp||PALETTE[0],registros:[],ativo:true});
  }
  salvarDados();closeModal();render();showToast("✓ Salvo");
}
function remover(caixinhaId,regId){
  if(!confirm("Remover este registro?"))return;
  caixinhas=caixinhas.map(function(c){
    return c.id===caixinhaId?Object.assign({},c,{registros:c.registros.filter(function(r){return r.id!==regId;})}):c;
  });
  salvarDados();render();
}

// ── Import / Export ──
function exportarBackup(){
  var blob=new Blob([JSON.stringify(caixinhas,null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;
  a.download="caixinha-backup-"+new Date().toISOString().split("T")[0]+".json";
  a.click();
  URL.revokeObjectURL(url);
  showToast("📤 Backup exportado!");
}
function importarBackup(event){
  var file=event.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var dados=JSON.parse(e.target.result);
      if(!Array.isArray(dados))throw new Error();
      if(confirm("Substituir dados atuais pelo backup?\n\n"+dados.length+" caixinhas encontradas.")){
        caixinhas=dados;
        salvarDados();render();
        showToast("✓ Backup restaurado!");
      }
    }catch(err){alert("Arquivo inválido. Certifique-se que é um backup .json do Caixinha.");}
  };
  reader.readAsText(file);
  event.target.value="";
}

document.addEventListener("keydown",function(e){
  if(e.key==="Enter"&&modalState&&modalState.tipo!=="gerenciar")confirmar();
  if(e.key==="Escape")closeModal();
});

function render(){
  renderHero();
  renderDailyChart();
  var meses=getMesesDisponiveis();
  if(!mesSelecionado&&meses.length)mesSelecionado=meses[0];
  renderMonthPills();
  renderMonthSummary();
  renderCards();
