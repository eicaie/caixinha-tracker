<body>

<div class="header">
  <h1>CAIXINHA<br><span class="green">TRACKER</span></h1>
  <div class="subtitle">REGISTRE O SALDO → VEJA QUANTO RENDEU</div>
</div>

<div class="wrap">
  <div class="summary-card">
    <div class="summary-title">Resumo geral</div>
    <div class="summary-grid" id="summary-grid"></div>
  </div>

  <div class="chart-card">
    <div class="chart-header">
      <span class="chart-title">Rendimento mensal acumulado</span>
      <div class="month-nav">
        <button class="nav-btn" onclick="mudarMes(-1)">‹</button>
        <span class="month-label" id="month-label"></span>
        <button class="nav-btn" id="nav-next" onclick="mudarMes(1)">›</button>
      </div>
    </div>
    <div class="chart-area"><canvas id="chart"></canvas></div>
    <div class="chart-legend" id="chart-legend"></div>
    <div class="chart-total" id="chart-total"></div>
  </div>

  <div class="reg-btn-wrap">
    <button class="reg-btn-main" onclick="abrirGerenciar()">+ Registrar saldo</button>
  </div>

  <div class="cards" id="cards"></div>

  <div class="backup-bar">
    <button class="bkp-btn bkp-export" onclick="exportarBackup()">⬇ Exportar backup</button>
    <button class="bkp-btn bkp-import" onclick="document.getElementById('import-file').click()">⬆ Importar backup</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importarBackup(event)" />
  </div>
  <div class="tip">
    <span class="green">Como usar:</span> Toque em "+ Registrar saldo" para lançar valores ou gerenciar caixinhas. Se fez depósito ou retirada no período, informe — o app desconta e mostra só o rendimento real.
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="overlay" onclick="fecharModal(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <div id="modal-body"></div>
    <div class="modal-btns" id="modal-btns">
      <button class="cancel-btn" onclick="closeModal()">Cancelar</button>
      <button class="confirm-btn confirm-green" id="confirm-btn" onclick="confirmar()">Salvar</button>
    </div>
  </div>
</div>

var STORAGE_KEY = "caixinha_tracker_v2";
var HEX_MAP = {1:"#00C896", 2:"#7C6FFF", 3:"#FF6B96"};

var NOMES_MES = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

function getHex(id) {
  return HEX_MAP[id] || EXTRA_HEX[(id - 4) % EXTRA_HEX.length];
}

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function() { t.classList.remove("show"); }, 2200);
}

function diasDesdeUltimo(registros) {
  if (!registros || !registros.length) return null;
  var ultimo = registros[registros.length - 1];
  var diff = Math.floor((new Date() - new Date(ultimo.data + "T12:00:00")) / 86400000);
  if (diff === 0) return "hoje";
  if (diff === 1) return "ontem";
  return "há " + diff + " dias";
}

function carregarDados() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      var dados = JSON.parse(raw);
      if (dados && Array.isArray(dados) && dados.length > 0) {
        return dados;
      }
    }
  } catch(e) {}
  // Primeira vez: salvar backup no localStorage e retornar
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DADOS_BACKUP));
  return JSON.parse(JSON.stringify(DADOS_BACKUP));
}

function salvarDados() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(caixinhas));
}

var caixinhas = carregarDados();
var modalState = null;
var mesAtual = new Date();
mesAtual.setDate(1);
var expandido = {};

function fBRL(v) {
  return Number(v).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
}
function fData(d) {
  return new Date(d + "T12:00:00").toLocaleDateString("pt-BR", {day:"2-digit", month:"2-digit", year:"2-digit"});
}
function hoje() {
  return new Date().toISOString().split("T")[0];
}

function calcRendimentos(registros) {
  return registros.map(function(reg, i) {
    if (i === 0) return Object.assign({}, reg, {rendimento: null});
    var ant = registros[i - 1];
    var rend = reg.saldo - ant.saldo - (reg.entrada || 0) + (reg.saida || 0);
    return Object.assign({}, reg, {rendimento: rend});
  });
}

function totalRendimento(registros) {
  if (!registros || registros.length < 2) return null;
  return calcRendimentos(registros)
    .filter(function(r) { return r.rendimento !== null; })
    .reduce(function(a, r) { return a + r.rendimento; }, 0);
}

function rendimentoMes(registros) {
  var agora = new Date();
  var ano = agora.getFullYear(), mes = agora.getMonth();
  var regs = calcRendimentos(registros).filter(function(r) {
    if (r.rendimento === null) return false;
    var d = new Date(r.data + "T12:00:00");
    return d.getFullYear() === ano && d.getMonth() === mes;
  });
  if (!regs.length) return null;
  return regs.reduce(function(a, r) { return a + r.rendimento; }, 0);
}

// ── Resumo ────────────────────────────────────────────────
function renderSummary() {
  var ativas = caixinhas.filter(function(c) { return c.ativo !== false; });
  var totalPatrimonio = ativas.reduce(function(acc, c) {
    var ultimo = c.registros[c.registros.length - 1];
    return acc + (ultimo ? ultimo.saldo : 0);
  }, 0);
  var totalMes = ativas.reduce(function(acc, c) {
    return acc + (rendimentoMes(c.registros) || 0);
  }, 0);
  var totalAcum = ativas.reduce(function(acc, c) {
    return acc + (totalRendimento(c.registros) || 0);
  }, 0);
  var temDados = ativas.some(function(c) { return c.registros.length > 0; });

  document.getElementById("summary-grid").innerHTML =
    '<div class="summary-item full">' +
      '<div class="summary-label">Patrimônio total</div>' +
      '<div class="summary-val">' + (temDados ? fBRL(totalPatrimonio) : "—") + '</div>' +
    '</div>' +
    '<div class="summary-item">' +
      '<div class="summary-label">Rendimento do mês</div>' +
      '<div class="summary-val-sm" style="color:' + (totalMes >= 0 ? '#00C896' : '#ff6b6b') + '">' +
        (temDados ? (totalMes >= 0 ? "+" : "") + fBRL(totalMes) : "—") + '</div>' +
    '</div>' +
    '<div class="summary-item">' +
      '<div class="summary-label">Rendimento total</div>' +
      '<div class="summary-val-sm" style="color:' + (totalAcum >= 0 ? '#7C6FFF' : '#ff6b6b') + '">' +
        (temDados ? (totalAcum >= 0 ? "+" : "") + fBRL(totalAcum) : "—") + '</div>' +
    '</div>';
}

// ── Gráfico ───────────────────────────────────────────────
function mudarMes(delta) {
  mesAtual.setMonth(mesAtual.getMonth() + delta);
  renderChart();
}

function renderChart() {
  var ano = mesAtual.getFullYear(), mes = mesAtual.getMonth();
  document.getElementById("month-label").textContent = NOMES_MES[mes] + " " + ano;
  var agora = new Date();
  var futuro = ano > agora.getFullYear() || (ano === agora.getFullYear() && mes > agora.getMonth());
  document.getElementById("nav-next").style.opacity = futuro ? "0.2" : "1";
  document.getElementById("nav-next").style.pointerEvents = futuro ? "none" : "auto";

  var canvas = document.getElementById("chart");
  var ctx = canvas.getContext("2d");
  var dpr = window.devicePixelRatio || 1;
  var W = canvas.parentElement.clientWidth, H = 160;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + "px"; canvas.style.height = H + "px";
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  var diasNoMes = new Date(ano, mes + 1, 0).getDate();
  var datasets = caixinhas.map(function(c) {
    var regs = calcRendimentos(c.registros).filter(function(r) {
      if (r.rendimento === null) return false;
      var d = new Date(r.data + "T12:00:00");
      return d.getFullYear() === ano && d.getMonth() === mes;
    });
    var acum = [];
    for (var i = 0; i < diasNoMes; i++) acum.push(0);
    regs.forEach(function(r) {
      var dia = new Date(r.data + "T12:00:00").getDate() - 1;
      for (var i = dia; i < diasNoMes; i++) acum[i] += r.rendimento;
    });
    return acum;
  });

  var temDados = datasets.some(function(d) { return d.some(function(v) { return v !== 0; }); });
  if (!temDados) {
    ctx.fillStyle = "#2a2a3a";
    ctx.font = "12px DM Mono, monospace";
    ctx.textAlign = "center";
    ctx.fillText("Nenhum registro neste mês", W / 2, H / 2);
    document.getElementById("chart-legend").innerHTML = "";
    document.getElementById("chart-total").innerHTML = "";
    return;
  }

  var padL = 54, padR = 12, padT = 10, padB = 28;
  var cW = W - padL - padR, cH = H - padT - padB;
  var allVals = [];
  datasets.forEach(function(d) { d.forEach(function(v) { allVals.push(v); }); });
  var maxVal = Math.max.apply(null, allVals.concat([0.01]));
  var minVal = Math.min.apply(null, allVals.concat([0]));
  var range = maxVal - minVal || 1;

  function xP(i) { return padL + (i / (diasNoMes - 1)) * cW; }
  function yP(v) { return padT + cH - ((v - minVal) / range) * cH; }

  ctx.strokeStyle = "#1a1a26"; ctx.lineWidth = 1;
  [0, 0.25, 0.5, 0.75, 1].forEach(function(t) {
    var y = padT + t * cH;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
  });

  datasets.forEach(function(data, ci) {
    var cor = getHex(caixinhas[ci].id);
    ctx.save(); ctx.globalAlpha = 0.08; ctx.fillStyle = cor;
    ctx.beginPath(); ctx.moveTo(xP(0), yP(0));
    data.forEach(function(v, i) { ctx.lineTo(xP(i), yP(v)); });
    ctx.lineTo(xP(diasNoMes - 1), yP(0)); ctx.closePath(); ctx.fill(); ctx.restore();
    ctx.strokeStyle = cor; ctx.lineWidth = 2; ctx.lineJoin = "round";
    ctx.beginPath();
    data.forEach(function(v, i) {
      if (i === 0) ctx.moveTo(xP(i), yP(v)); else ctx.lineTo(xP(i), yP(v));
    });
    ctx.stroke();
    var lv = data[diasNoMes - 1];
    if (lv !== 0) {
      ctx.fillStyle = cor;
      ctx.beginPath(); ctx.arc(xP(diasNoMes - 1), yP(lv), 4, 0, Math.PI * 2); ctx.fill();
    }
  });

  ctx.fillStyle = "#555"; ctx.font = "10px DM Mono, monospace"; ctx.textAlign = "center";
  [0, 7, 14, 21, diasNoMes - 1].forEach(function(i) {
    if (i < diasNoMes) ctx.fillText(i + 1, xP(i), H - 6);
  });
  ctx.textAlign = "right";
  [0, 0.5, 1].forEach(function(t) {
    var v = minVal + t * range;
    ctx.fillText("R$" + (v >= 0 ? "" : "-") + Math.abs(v).toFixed(0), padL - 4, yP(v) + 4);
  });

  document.getElementById("chart-legend").innerHTML = caixinhas.map(function(c, i) {
    return '<div class="legend-item"><div class="legend-dot" style="background:' + getHex(c.id) + '"></div><span>' + c.nome + '</span></div>';
  }).join("");

  var totalMes = datasets.reduce(function(acc, d) { return acc + d[diasNoMes - 1]; }, 0);
  document.getElementById("chart-total").innerHTML = temDados
    ? 'Total acumulado no mês: <span>' + (totalMes >= 0 ? "+" : "") + fBRL(totalMes) + '</span>' : "";
}

function render() {
  renderSummary();
  var container = document.getElementById("cards");
  container.innerHTML = "";
  var ativas = caixinhas.filter(function(c) { return c.ativo !== false; });

  ativas.forEach(function(c) {
    var cor = getHex(c.id);
    var regs = calcRendimentos(c.registros);
    var totalRend = totalRendimento(c.registros);
    var rendMes = rendimentoMes(c.registros);
    var ultimo = c.registros[c.registros.length - 1];
    var saldoAtual = ultimo ? fBRL(ultimo.saldo) : "—";
    var diasUltimo = diasDesdeUltimo(c.registros);

    var rendMesHTML = rendMes !== null
      ? '<span style="color:' + (rendMes >= 0 ? '#00C896' : '#ff6b6b') + '">' + (rendMes >= 0 ? "+" : "") + fBRL(rendMes) + '</span>'
      : '<span style="color:#444">—</span>';
    var rendTotalHTML = totalRend !== null
      ? '<span style="color:' + (totalRend >= 0 ? '#00C896' : '#ff6b6b') + '">' + (totalRend >= 0 ? "+" : "") + fBRL(totalRend) + '</span>'
      : '<span style="color:#444">—</span>';

    var revsRegs = regs.slice().reverse();
    var visiveis = expandido[c.id] ? revsRegs : revsRegs.slice(0, 7);
    var temMais = revsRegs.length > 7;

    var hist = "";
    if (regs.length === 0) {
      hist = '<div class="empty">nenhum saldo registrado ainda</div>';
    } else {
      hist = '<div class="table-wrap"><div class="table-head"><span>Data</span><span>Saldo</span><span>Moviment.</span><span>Rendeu</span><span></span></div>';
      visiveis.forEach(function(reg) {
        var ent = reg.entrada || 0, sai = reg.saida || 0;
        var mov = '<span class="mov-nenhum">—</span>';
        if (ent > 0) mov = '<span class="mov-entrada">+' + fBRL(ent) + '</span>';
        else if (sai > 0) mov = '<span class="mov-saida">-' + fBRL(sai) + '</span>';
        var rend = '<span class="rend-null">—</span>';
        if (reg.rendimento !== null)
          rend = '<span class="' + (reg.rendimento >= 0 ? 'rend-pos' : 'rend-neg') + '">' + (reg.rendimento >= 0 ? "+" : "") + fBRL(reg.rendimento) + '</span>';
        hist += '<div class="reg-row">' +
          '<span class="reg-date">' + fData(reg.data) + '</span>' +
          '<span class="reg-saldo">' + fBRL(reg.saldo) + '</span>' +
          mov + rend +
          '<button class="del-btn" onclick="remover(' + c.id + ',' + reg.id + ')">×</button>' +
          '</div>';
      });
      hist += '</div>';
      if (temMais) {
        if (!expandido[c.id]) {
          hist += '<button class="ver-mais-btn" onclick="toggleExpandido(' + c.id + ')">↓ ver mais (' + (revsRegs.length - 7) + ' registros anteriores)</button>';
        } else {
          hist += '<button class="ver-mais-btn" onclick="toggleExpandido(' + c.id + ')">↑ ocultar anteriores</button>';
        }
      }
    }

    var lastEntryHTML = diasUltimo
      ? '<div class="last-entry"><div class="last-entry-dot" style="background:' + cor + '"></div>último lançamento ' + diasUltimo + '</div>'
      : '';

    container.innerHTML +=
      '<div class="card" style="border:1px solid ' + cor + '25">' +
        '<div class="card-head">' +
          '<div class="card-title">' +
            '<div class="dot" style="background:' + cor + ';box-shadow:0 0 8px ' + cor + '"></div>' +
            '<span class="nome">' + c.nome + '</span>' +
            '<span class="tag" style="background:' + cor + '18;color:' + cor + '">' + c.pct + '% CDI</span>' +
          '</div>' +
          '<button class="edit-btn" onclick="abrirConfig(' + c.id + ')">✎</button>' +
        '</div>' +
        '<div class="metrics">' +
          '<div class="metric"><div class="metric-label">Saldo atual</div><div class="metric-val" style="color:' + cor + '">' + saldoAtual + '</div></div>' +
          '<div class="metric"><div class="metric-label">Rendimento do mês</div><div class="metric-val">' + rendMesHTML + '</div></div>' +
        '</div>' +
        '<div class="metric-total">' +
          '<span class="metric-total-label">Rendimento total acumulado</span>' +
          '<span class="metric-total-val">' + rendTotalHTML + '</span>' +
        '</div>' +
        lastEntryHTML +
        hist +
      '</div>';
  });

  renderChart();
}

function toggleExpandido(id) {
  expandido[id] = !expandido[id];
  render();
}

  document.getElementById("confirm-btn").textContent = "Salvar";
  document.getElementById("confirm-btn").className = "confirm-btn confirm-green";
  document.getElementById("modal-body").innerHTML =
    '<button class="modal-back-btn" onclick="abrirGerenciar()">← voltar</button>' +
    '<div class="field"><label>Saldo atual (R$)</label><input type="number" inputmode="decimal" id="input-saldo" placeholder="0,00" /></div>' +
    '<div class="field"><label>Data</label><input type="date" id="input-data" value="' + hoje() + '" /></div>' +
    '<hr class="divider" />' +
    '<div class="sec-label">MOVIMENTAÇÃO NO PERÍODO (opcional)</div>' +
    '<div class="field-row">' +
      '<div><label style="font-size:10px;color:#666;letter-spacing:0.1em;display:block;margin-bottom:7px;text-transform:uppercase;">Depósito (R$)</label>' +
        '<input type="number" inputmode="decimal" id="input-entrada" placeholder="0,00" style="background:#1a1a26;border:1px solid #2a2a3e;border-radius:10px;color:#F0F0F0;font-family:\'DM Mono\',monospace;font-size:16px;padding:14px;width:100%;outline:none;" />' +
        '<div class="field-hint">Dinheiro que você colocou</div></div>' +
      '<div><label style="font-size:10px;color:#666;letter-spacing:0.1em;display:block;margin-bottom:7px;text-transform:uppercase;">Retirada (R$)</label>' +
        '<input type="number" inputmode="decimal" id="input-saida" placeholder="0,00" style="background:#1a1a26;border:1px solid #2a2a3e;border-radius:10px;color:#F0F0F0;font-family:\'DM Mono\',monospace;font-size:16px;padding:14px;width:100%;outline:none;" />' +
        '<div class="field-hint">Dinheiro que você tirou</div></div>' +
    '</div>';
  setTimeout(function() {
    var el = document.getElementById("input-saldo");
    if (el) el.focus();
  }, 100);
}

function abrirConfig(id) {
  var c = caixinhas.find(function(x) { return x.id === id; });
  modalState = { tipo: "config", id: id };
  document.getElementById("modal-title").textContent = "Configurar caixinha";
  document.getElementById("modal-sub").textContent = "";
  document.getElementById("modal-btns").style.display = "flex";
  document.getElementById("confirm-btn").textContent = "Salvar";
  document.getElementById("confirm-btn").className = "confirm-btn confirm-purple";
  document.getElementById("modal-body").innerHTML =
    '<button class="modal-back-btn" onclick="abrirGerenciar()">← voltar</button>' +
    '<div class="field"><label>Nome</label><input type="text" id="input-nome" value="' + c.nome + '" /></div>' +
    '<div class="field"><label>% do CDI</label><input type="number" inputmode="decimal" id="input-pct" value="' + c.pct + '" placeholder="ex: 121" /></div>';
  setTimeout(function() {
    var el = document.getElementById("input-nome");
    if (el) el.focus();
  }, 100);
}

function abrirNovaCaixinha() {
  modalState = { tipo: "nova" };
  document.getElementById("modal-title").textContent = "Nova caixinha";
  document.getElementById("modal-sub").textContent = "";
  document.getElementById("modal-btns").style.display = "flex";
  document.getElementById("confirm-btn").textContent = "Criar";
  document.getElementById("confirm-btn").className = "confirm-btn confirm-green";
  document.getElementById("modal-body").innerHTML =
    '<button class="modal-back-btn" onclick="abrirGerenciar()">← voltar</button>' +
    '<div class="field"><label>Nome</label><input type="text" id="input-nome" placeholder="ex: PicPay 3" /></div>' +
    '<div class="field"><label>% do CDI</label><input type="number" inputmode="decimal" id="input-pct" placeholder="ex: 121" /></div>';
  setTimeout(function() {
    var el = document.getElementById("input-nome");
    if (el) el.focus();
  }, 100);
}

function excluirCaixinha(id) {
  var c = caixinhas.find(function(x) { return x.id === id; });
  if (!confirm('Excluir "' + c.nome + '"? Os dados sumirão do card mas ficam no gráfico.')) return;
  caixinhas = caixinhas.map(function(cx) {
    return cx.id === id ? Object.assign({}, cx, {ativo: false}) : cx;
  });
  salvarDados();
  renderGerenciarBody();
  render();
}

function closeModal() {
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("modal-btns").style.display = "flex";
  modalState = null;
}
function fecharModal(e) {
  if (e.target === document.getElementById("overlay")) closeModal();
}

function confirmar() {
  if (!modalState) return;
  if (modalState.tipo === "saldo") {
    var saldoEl = document.getElementById("input-saldo");
    var saldo = parseFloat(saldoEl ? saldoEl.value : "");
    var dataEl = document.getElementById("input-data");
    var data = dataEl ? dataEl.value : hoje();
    var entradaEl = document.getElementById("input-entrada");
    var entrada = parseFloat(entradaEl ? entradaEl.value : "") || 0;
    var saidaEl = document.getElementById("input-saida");
    var saida = parseFloat(saidaEl ? saidaEl.value : "") || 0;
    if (!saldo || saldo <= 0) { if (saldoEl) saldoEl.focus(); return; }
    caixinhas = caixinhas.map(function(c) {
      if (c.id !== modalState.id) return c;
      var novos = c.registros.concat([{ id: Date.now(), data: data, saldo: saldo, entrada: entrada, saida: saida }]);
      novos.sort(function(a, b) { return a.data.localeCompare(b.data); });
      return Object.assign({}, c, {registros: novos});
    });
  } else if (modalState.tipo === "config") {
    var nomeEl = document.getElementById("input-nome");
    var nome = nomeEl ? nomeEl.value.trim() : "";
    var pctEl = document.getElementById("input-pct");
    var pct = parseFloat(pctEl ? pctEl.value : "");
    caixinhas = caixinhas.map(function(c) {
      return c.id === modalState.id ? Object.assign({}, c, {nome: nome || c.nome, pct: pct || c.pct}) : c;
    });
  } else if (modalState.tipo === "nova") {
    var nomeEl2 = document.getElementById("input-nome");
    var nome2 = nomeEl2 ? nomeEl2.value.trim() : "";
    var pctEl2 = document.getElementById("input-pct");
    var pct2 = parseFloat(pctEl2 ? pctEl2.value : "");
    if (!nome2 || !pct2) return;
    var newId = Math.max.apply(null, caixinhas.map(function(c) { return c.id; })) + 1;
    caixinhas.push({ id: newId, nome: nome2, pct: pct2, registros: [], ativo: true });
  }
  salvarDados();
  closeModal();
  render();
  showToast("✓ Salvo com sucesso!");
}

function remover(caixinhaId, regId) {
  if (!confirm("Remover este registro?")) return;
  caixinhas = caixinhas.map(function(c) {
    return c.id === caixinhaId
      ? Object.assign({}, c, {registros: c.registros.filter(function(r) { return r.id !== regId; })})
      : c;
  });
  salvarDados();
  render();
}

function exportarBackup() {
  var blob = new Blob([JSON.stringify(caixinhas, null, 2)], {type: "application/json"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "caixinha-backup-" + new Date().toISOString().split("T")[0] + ".json";
  a.click();
  URL.revokeObjectURL(url);
}

function importarBackup(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var dados = JSON.parse(e.target.result);
      if (!Array.isArray(dados)) throw new Error();
      if (confirm("Isso vai substituir os dados atuais. Confirma?")) {
        caixinhas = dados;
        salvarDados();
        render();
        showToast("✓ Backup restaurado!");
      }
    } catch(err) { alert("Arquivo inválido."); }
  };
  reader.readAsText(file);
  event.target.value = "";
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && modalState && modalState.tipo !== "gerenciar") confirmar();
  if (e.key === "Escape") closeModal();
});

render();
</script>
</body>
</html>
